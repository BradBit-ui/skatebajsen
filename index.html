<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skate-bajsen: REMASTERED</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; transition: background-color 0.5s; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* UI Element */
        #game-ui { position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; color: #f1c40f; font-size: clamp(16px, 4vw, 24px); font-weight: bold; text-shadow: 2px 2px #000; z-index: 95; pointer-events: none; }
        #progress-bar-bg { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #f1c40f; margin-top: 5px; border-radius: 5px; overflow: hidden; }
        #progress-bar-fill { width: 0%; height: 100%; background: #f1c40f; transition: width 0.3s ease-out; }
        
        /* Menyer */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #start-menu { background: radial-gradient(circle, #1a1a2e 0%, #000 100%); color: white; }
        #level-intro { display: none; background: rgba(0,0,0,0.7); z-index: 300; }
        #level-intro-box { padding: 30px 60px; color: white; font-size: 36px; font-weight: bold; border: 5px solid white; text-transform: uppercase; }
        
        .menu-sprite { height: 20vh; margin-bottom: 20px; animation: menuFloat 3s infinite ease-in-out; }
        @keyframes menuFloat { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
        
        .lvl-grid { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .lvl-btn { width: 50px; height: 50px; background: #333; border: 3px solid #f1c40f; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; border-radius: 8px; }
        .lvl-btn.active { background: #f1c40f; color: black; box-shadow: 0 0 15px #f1c40f; transform: scale(1.1); }
        
        .game-btn-large { padding: 20px 50px; font-size: 24px; background-color: #f1c40f; border: none; border-bottom: 6px solid #d35400; cursor: pointer; font-weight: bold; border-radius: 12px; }
        .game-btn-large:active { transform: translateY(4px); border-bottom-width: 2px; }

        #win-screen { display: none; background-color: #1a1a2e; color: white; z-index: 500; }
        #ui-layer { position: absolute; bottom: 20px; right: 20px; z-index: 400; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; border: 1px solid #f1c40f; }
        
        .wow-text { position: absolute; color: #f1c40f; font-size: 60px; font-weight: bold; z-index: 200; pointer-events: none; animation: wowPop 0.8s ease-out forwards; }
        @keyframes wowPop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1) translateY(-50px); opacity: 0; } }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="game-ui" style="display: none;">
        <div id="score-text">POÄNG: 0 / 30</div>
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>

    <div id="level-intro" class="overlay"><div id="level-intro-box">LEVEL 1</div></div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="start-menu" class="overlay">
        <img src="bajskorv_sprite.png" class="menu-sprite" alt="Bajs">
        <div id="menu-lvl-text" style="color:#f1c40f; font-weight:bold; margin-bottom: 10px;">Level 1 - City</div>
        <div class="lvl-grid">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>
        <button class="game-btn-large" onclick="startGame()">KÖR!</button>
    </div>

    <div id="win-screen" class="overlay">
        <h1 style="color: #f1c40f;">BOOMBÄJS-PARTY!</h1>
        <p>Du rensade alla nivåer!</p>
        <button class="game-btn-large" onclick="location.reload()">SPELA IGEN</button>
    </div>

    <div id="ui-layer">
        <input type="range" id="volume-slider" min="0" max="0.5" step="0.01" value="0.1">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    
    let w, h, groundY, playerSize, itemSizeBase;
    let player = { x: 0, y: 0, vY: 0, grav: 0.8, jump: -16, isJumping: false, rot: 0, targetRot: 0 };
    let currentLevel = 1, gameActive = false, itemsCollected = 0, bgScroll = 0, screenShake = 0;
    let spawnTimer = 0, boostTimer = 0, isEndingLevel = false, projectile = null, bossHealth = 200, hasPaperAmmo = 0;
    let collectables = [], particles = [];

    const levelGoals = [30, 35, 40, 45, 50];
    const levelData = [
        { name: "Level 1 - City", color: "#9b59b2", bg: "#1a1a2e" },
        { name: "Level 2 - Candy", color: "#e74c3c", bg: "#2e0a1a" },
        { name: "Level 3 - Zoo", color: "#2ecc71", bg: "#0a1f0a" },
        { name: "Level 4 - Space", color: "#3498db", bg: "#050a1f" },
        { name: "Level 5 - Cats & Rainbows", color: "#f1c40f", bg: "#1f1f05" },
        { name: "Level 6 - BOSS FIGHTEN", color: "#ff0000", bg: "#200000" }
    ];

    // Ljud (Behåller din logik men snyggar till hanteringen)
    const sounds = {
        fart: [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')],
        ouch: [new Audio('ouch.m4a'), new Audio('Aj.m4a')],
        wow: new Audio('wow.m4a'), win: new Audio('win.mp3'), next: new Audio('nextlevel.mp3')
    };

    function selectLevel(n) {
        currentLevel = n;
        document.getElementById("menu-lvl-text").innerText = levelData[n-1].name;
        document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active', i===n-1));
    }

    function startGame() {
        resize();
        document.getElementById("start-menu").style.display = "none";
        loadLevelSequence();
    }

    function loadLevelSequence() {
        gameActive = false;
        isEndingLevel = false;
        const intro = document.getElementById("level-intro");
        intro.style.display = "flex";
        document.getElementById("level-intro-box").innerText = levelData[currentLevel-1].name;
        
        collectables = [];
        itemsCollected = 0;
        updateUI();

        setTimeout(() => {
            intro.style.display = "none";
            gameActive = true;
            document.getElementById("game-ui").style.display = currentLevel < 6 ? "block" : "none";
        }, 1500);
    }

    function updateUI() {
        const goal = levelGoals[currentLevel-1] || 1;
        document.getElementById("score-text").innerText = `POÄNG: ${itemsCollected} / ${goal}`;
        document.getElementById("progress-bar-fill").style.width = (itemsCollected / goal * 100) + "%";
    }

    function handleAction() {
        if(!gameActive) return;
        
        if(!player.isJumping) {
            player.vY = player.jump;
            player.isJumping = true;
            player.targetRot = -20; // Luta bakåt vid upphopp
            const f = sounds.fart[Math.floor(Math.random()*sounds.fart.length)];
            f.currentTime = 0; f.play().catch(()=>{});
        } else if(currentLevel === 6 && hasPaperAmmo > 0) {
            hasPaperAmmo--;
            projectile = { x: player.x + playerSize, y: player.y + playerSize/2 };
            player.targetRot += 360; // Gör en volt!
        }
    }

    function gameLoop() {
        requestAnimationFrame(gameLoop);
        if(!gameActive && !isEndingLevel) return;

        ctx.clearRect(0, 0, w, h);
        
        // Skaka skärmen
        if(screenShake > 0) {
            ctx.save();
            ctx.translate(Math.random()*screenShake-screenShake/2, Math.random()*screenShake-screenShake/2);
            screenShake *= 0.9;
        }

        // 1. Bakgrund & Rörelse
        let speed = boostTimer > 0 ? 15 : 7;
        bgScroll -= speed * 0.5;
        if(bgScroll <= -w) bgScroll = 0;
        
        // Rita BG (placeholder färg om bild saknas)
        ctx.fillStyle = levelData[currentLevel-1].bg;
        ctx.fillRect(0,0,w,h);

        // 2. Spelaren
        if(!isEndingLevel) {
            player.vY += player.grav;
            player.y += player.vY;

            // Rotation-smoothing
            player.rot += (player.targetRot - player.rot) * 0.1;

            if(player.y > groundY - playerSize) {
                player.y = groundY - playerSize;
                player.vY = 0;
                player.isJumping = false;
                player.targetRot = 0;
            }
        } else {
            player.x += 15;
            if(player.x > w) {
                currentLevel++;
                if(currentLevel > 6) {
                    gameActive = false;
                    document.getElementById("win-screen").style.display = "flex";
                } else {
                    loadLevelSequence();
                }
            }
        }

        // 3. Collectables & Boss logik
        if(gameActive && currentLevel < 6) {
            spawnTimer++;
            if(spawnTimer > 60) {
                collectables.push({
                    x: w, 
                    y: groundY - itemSizeBase - Math.random()*(h*0.4),
                    w: itemSizeBase, 
                    h: itemSizeBase,
                    collected: false
                });
                spawnTimer = 0;
            }
        }

        // Rita och kollidera
        collectables.forEach((c, i) => {
            c.x -= speed;
            ctx.fillStyle = "#f1c40f";
            ctx.fillRect(c.x, c.y, c.w, c.h); // Ersätt med bild

            if(!isEndingLevel && !c.collected && 
               player.x < c.x + c.w && player.x + playerSize > c.x &&
               player.y < c.y + c.h && player.y + playerSize > c.y) {
                c.collected = true;
                itemsCollected++;
                updateUI();
                if(itemsCollected >= levelGoals[currentLevel-1]) {
                    isEndingLevel = true;
                    sounds.next.play().catch(()=>{});
                }
            }
        });
        collectables = collectables.filter(c => c.x > -100 && !c.collected);

        // 4. Rita spelaren (Bajsen)
        ctx.save();
        ctx.translate(player.x + playerSize/2, player.y + playerSize/2);
        ctx.rotate(player.rot * Math.PI / 180);
        // Här ritar du assets.player bilden egentligen
        ctx.fillStyle = "#8B4513";
        ctx.fillRect(-playerSize/2, -playerSize/2, playerSize, playerSize); 
        ctx.restore();

        if(screenShake > 0) ctx.restore();
    }

    function resize() {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        groundY = h * 0.8;
        playerSize = h * 0.15;
        itemSizeBase = playerSize * 0.7;
        player.x = w * 0.15;
        if(!player.isJumping) player.y = groundY - playerSize;
    }

    // Input-hantering
    window.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); }, {passive: false});
    window.addEventListener('mousedown', (e) => { if(e.button === 0) handleAction(); });
    window.addEventListener('keydown', (e) => { if(e.code === "Space") handleAction(); });
    window.addEventListener('resize', resize);

    resize();
    gameLoop();
</script>
</body>
</html>
