<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skate-bajsen: THE RECOVERY</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', sans-serif; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        #start-menu, #level-menu, #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .game-btn { padding: 15px 30px; font-size: 24px; background: #f1c40f; border: 4px solid #000; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .level-selector { display: flex; gap: 5px; margin: 10px; }
        .lvl-btn { width: 40px; height: 40px; background: #333; border: 2px solid #f1c40f; color: white; cursor: pointer; }
        .lvl-btn.active { background: #f1c40f; color: black; }
        #ui-layer { position: absolute; bottom: 20px; right: 20px; z-index: 150; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-menu">
        <h1>SKATE-BAJSEN</h1>
        <div class="level-selector">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>
        <button class="game-btn" onclick="startGame()">LETS GO!</button>
    </div>

    <div id="level-menu" style="display:none;">
        <h1 id="level-title">KLAR!</h1>
        <button class="game-btn" onclick="nextLevel()">NÄSTA NIVÅ</button>
    </div>

    <div id="win-screen" style="display:none;">
        <h1 style="color:#f1c40f;">GRATTIS!!!</h1>
        <p>SUPER BAJS-SKATAREN!</p>
        <button class="game-btn" onclick="location.reload()">SPELA IGEN</button>
    </div>

    <div id="ui-layer">
        <span style="color:white; font-size:12px;">VOLYM:</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const volumeSlider = document.getElementById("volume-slider");
    
    let gameActive = false, currentLevel = 1, bgScroll = 0, gameStartTime = 0;
    let w, h, groundY, playerSize, itemSize, bgSpeed = 7;
    let bossHealth = 100, hasPaperAmmo = 0, pipeTimer = 0, projectile = null;

    // Spelaren
    let player = { x: 0, y: 0, velocityY: 0, gravity: 0.8, jumpPower: -18, isJumping: false };

    // Bilder
    const assets = {
        bg: [new Image(), new Image(), new Image(), new Image(), new Image(), new Image()],
        player: new Image(), boss: new Image(), paper: new Image(), fire: new Image()
    };
    assets.player.src = 'bajskorv_sprite.png';
    assets.boss.src = 'boss_sprite.png';
    assets.paper.src = 'paper_sprite.png';
    assets.fire.src = 'fire_sprite.png';
    for(let i=1; i<=6; i++) assets.bg[i-1].src = i === 1 ? 'pixel_background.png' : `pixel_background${i}.png`;

    // Ljud
    const sounds = {
        fart: [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')],
        win: new Audio('win.mp3'),
        hit: new Audio('hit.mp3'),
        jump: new Audio('superprutt.m4a')
    };

    function playSound(s) {
        s.volume = volumeSlider.value;
        s.currentTime = 0;
        s.play().catch(e => console.log("Ljudfel:", e));
    }

    function selectLevel(n) {
        currentLevel = n;
        document.querySelectorAll('.lvl-btn').forEach((b, i) => b.classList.toggle('active', i === n-1));
    }

    function resize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        playerSize = Math.min(w, h) * 0.2;
        itemSize = playerSize * 0.6;
        groundY = h * 0.8;
        if(currentLevel < 6) { player.x = w * 0.2; player.y = groundY - playerSize; }
    }

    window.jump = function() {
        if(!gameActive) return;
        if(!player.isJumping) {
            player.velocityY = player.jumpPower;
            player.isJumping = true;
            playSound(sounds.fart[Math.floor(Math.random()*3)]);
        } else if(currentLevel === 6) {
            // Trick/Skjut i Level 6
            playSound(sounds.jump);
            if(hasPaperAmmo > 0) {
                hasPaperAmmo--;
                projectile = { x: player.x, y: player.y, vx: 15 };
            }
        }
    };

    window.startGame = function() {
        resize();
        gameStartTime = Date.now();
        gameActive = true;
        document.getElementById("start-menu").style.display = "none";
    };

    let collectables = [];
    function gameLoop() {
        ctx.clearRect(0, 0, w, h);
        
        // Bakgrund & Himmel
        const skyColors = ["#87CEEB", "#ffb6c1", "#90ee90", "#0b0b16", "#ffe0f0", "#1a1a1a"];
        ctx.fillStyle = skyColors[currentLevel-1];
        ctx.fillRect(0, 0, w, h);

        if(gameActive) {
            let bg = assets.bg[currentLevel-1];
            
            if(currentLevel < 6) {
                // NORMAL MOTOR (Level 1-5)
                bgScroll -= bgSpeed;
                if(bgScroll <= -w) bgScroll = 0;
                if(bg.complete) {
                    ctx.drawImage(bg, bgScroll, 0, w, h);
                    ctx.drawImage(bg, bgScroll + w, 0, w, h);
                }

                player.velocityY += player.gravity;
                player.y += player.velocityY;
                if(player.y > groundY - playerSize) {
                    player.y = groundY - playerSize;
                    player.velocityY = 0;
                    player.isJumping = false;
                }

                // Spawn objekt (Enkel version för att undvika krasch)
                if(Math.random() < 0.02) collectables.push({x: w, y: groundY - itemSize, type: 'item'});

            } else {
                // HALFPIPE MOTOR (Level 6)
                pipeTimer += 0.03;
                player.x = (w/2 - playerSize/2) + Math.sin(pipeTimer) * (w*0.35);
                let curve = Math.pow((player.x - (w/2-playerSize/2))/(w*0.35), 2) * 150;
                let currentGround = groundY - curve;

                player.velocityY += player.gravity;
                player.y += player.velocityY;
                if(player.y > currentGround - playerSize) {
                    player.y = currentGround - playerSize;
                    player.velocityY = 0;
                    player.isJumping = false;
                }

                if(bg.complete) ctx.drawImage(bg, 0, 0, w, h);

                // Boss
                let bossX = w * 0.7, bossY = h * 0.2;
                if(assets.boss.complete) ctx.drawImage(assets.boss, bossX, bossY, playerSize*1.5, playerSize*1.5);
                
                // Pappers-attacker
                if(Math.random() < 0.01) collectables.push({x: bossX, y: bossY, vx: -8, type: 'paper'});

                // Projektil
                if(projectile) {
                    projectile.x += projectile.vx;
                    ctx.drawImage(assets.paper, projectile.x, projectile.y, 50, 50);
                    if(projectile.x > bossX) {
                        bossHealth -= 10;
                        playSound(sounds.hit);
                        projectile = null;
                        if(bossHealth <= 0) { gameActive = false; document.getElementById("win-screen").style.display = "flex"; playSound(sounds.win); }
                    }
                }
            }

            // Rita spelare
            ctx.drawImage(assets.player, player.x, player.y, playerSize, playerSize);

            // Hantera kollektioner
            for(let i = collectables.length - 1; i >= 0; i--) {
                let c = collectables[i];
                if(currentLevel < 6) c.x -= bgSpeed; else c.x += c.vx;
                
                ctx.fillStyle = "white";
                if(c.type === 'item') ctx.fillRect(c.x, c.y, itemSize, itemSize); // Placeholder för items
                else ctx.drawImage(assets.paper, c.x, c.y, 50, 50);

                if(player.x < c.x + 50 && player.x + playerSize > c.x && player.y < c.y + 50 && player.y + playerSize > c.y) {
                    if(c.type === 'paper') hasPaperAmmo++;
                    collectables.splice(i, 1);
                }
            }
        }

        requestAnimationFrame(gameLoop);
    }

    window.addEventListener("mousedown", jump);
    window.addEventListener("touchstart", (e) => { e.preventDefault(); jump(); });
    window.addEventListener("resize", resize);

    resize();
    gameLoop();
</script>
</body>
</html>
