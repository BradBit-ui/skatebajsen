<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Skate-bajsen: BOSS DESTROYER Edition</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; transition: background-color 1s; }
        
        #rotate-message { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffb6c1; color: #333; z-index: 300; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .phone-icon { font-size: 80px; animation: rotateAnim 2s infinite ease-in-out; }
        @keyframes rotateAnim { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }

        #start-menu, #level-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .game-btn-large { padding: 25px 50px; font-size: 32px; background-color: #f1c40f; border: 6px solid #000; box-shadow: 10px 10px 0px #d35400; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; }
        
        /* Level Selector Styling */
        .level-selector { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; justify-content: center; }
        .lvl-btn { width: 45px; height: 45px; background: #333; border: 3px solid #f1c40f; color: white; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .lvl-btn.active { background: #f1c40f; color: black; box-shadow: 0 0 15px #f1c40f; }

        .highscore-box { background: rgba(255, 255, 255, 0.1); padding: 10px; border-radius: 10px; border: 2px dashed #f1c40f; margin-top: 10px; }
        .highscore-title { color: #f1c40f; font-size: 12px; text-transform: uppercase; }
        .highscore-val { font-size: 24px; font-weight: bold; }

        #ui-layer { position: absolute; bottom: 30px; right: 30px; z-index: 50; }
        #volume-slider { cursor: pointer; width: 100px; accent-color: #f1c40f; }
        
        h1 { font-size: 8vw; color: #fff; text-shadow: 6px 6px 0px #d35400; margin: 0; }
        #level-menu { display: none; }

        /* FET VINSTSKÄRM STYLING */
        #win-screen { 
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: radial-gradient(circle, #2c3e50, #000000);
            color: white; 
            z-index: 200; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            overflow: hidden;
        }

        .win-title {
            font-size: 10vw;
            color: #f1c40f;
            text-shadow: 0 0 20px #f1c40f, 5px 5px 0 #d35400;
            animation: winPulse 1s infinite alternate, glitter 0.5s infinite;
            margin-bottom: 20px;
        }

        .win-subtitle {
            font-size: 4vw;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 30px;
        }

        @keyframes winPulse {
            from { transform: scale(1); text-shadow: 0 0 20px #f1c40f, 5px 5px 0 #d35400; }
            to { transform: scale(1.1); text-shadow: 0 0 40px #fff, 5px 5px 0 #d35400; }
        }

        @keyframes glitter {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .glitter-particle {
            position: absolute;
            width: 10px; height: 10px;
            background: #fff;
            border-radius: 50%;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="rotate-message"><div class="phone-icon">📱🔄</div><h2>Vänd telefonen!</h2></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-menu">
        <h1>SKATE-BAJSEN</h1>
        
        <div class="highscore-box">
            <div class="highscore-title">🏆 Snabbaste Tid</div>
            <div id="best-time-display" class="highscore-val">-- sek</div>
        </div>

        <p style="margin-top: 15px; color: #f1c40f; font-weight: bold; font-size: 14px;">VÄLJ LEVEL:</p>
        <div class="level-selector">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>

        <button id="start-btn-menu" class="game-btn-large">LETS GO!</button>
    </div>

    <div id="level-menu">
        <h1 id="level-title">NÄSTA NIVÅ</h1>
        <p id="level-desc">Snyggt!</p>
        <button id="go-btn" class="game-btn-large">LETS GO!</button>
    </div>

    <div id="win-screen">
        <div class="win-title">GRATTIS!!!</div>
        <div class="win-subtitle">Du vann över bossen och är nu<br><strong>SUPER BAJS-SKATAREN</strong></div>
        <div id="final-time" class="highscore-val" style="color: #f1c40f; margin-bottom: 20px;">Tid: -- sek</div>
        <button class="game-btn-large" onclick="location.reload()">SPELA IGEN?</button>
        </div>

    <div id="ui-layer">
        <input type="range" id="volume-slider" min="0" max="0.5" step="0.01" value="0.1">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const startMenu = document.getElementById("start-menu"), levelMenu = document.getElementById("level-menu"), winScreen = document.getElementById("win-screen");
    const volumeSlider = document.getElementById("volume-slider"), rotateMessage = document.getElementById("rotate-message");

    let gameActive = false, transitioning = false, itemsCollected = 0, currentLevel = 1, bgScroll = 0;
    let w, h, groundY, playerSize, itemSize, bgSpeed = 7, bgScale, boostTimer = 0;
    let gameStartTime = 0, currentSeconds = 0;

    // Boss variabler
    let bossHealth = 100, playerRotation = 0, isDoingTrick = false, bossX = 0, bossY = 0;

    let bestTime = localStorage.getItem("skateBajsBestTime") || Infinity;
    document.getElementById("best-time-display").innerText = bestTime === Infinity ? "-- sek" : bestTime + " sek";

    const assets = {
        bg1: new Image(), bg2: new Image(), bg3: new Image(), bg4: new Image(), bg5: new Image(), bg6: new Image(), player: new Image(), gold: new Image(), fire: new Image(), boss: new Image(), paper: new Image(),
        items: {
            lvl1: [new Image(), new Image(), new Image()],
            lvl2: [new Image(), new Image(), new Image()],
            lvl3: [new Image(), new Image(), new Image()],
            lvl4: [new Image(), new Image(), new Image()],
            lvl5: [new Image(), new Image(), new Image()]
        }
    };
    // Ladda bakgrunder
    assets.bg1.src = 'pixel_background.png'; assets.bg2.src = 'pixel_background2.png'; assets.bg3.src = 'pixel_background3.png'; assets.bg4.src = 'pixel_background4.png'; assets.bg5.src = 'pixel_background5.png'; assets.bg6.src = 'pixel_background6.png';
    // Ladda spelare/effekter/boss
    assets.player.src = 'bajskorv_sprite.png'; assets.gold.src = 'gold_poop.png'; assets.fire.src = 'fire_sprite.png'; assets.boss.src = 'boss_sprite.png'; assets.paper.src = 'paper_sprite.png';
    // Ladda föremål
    assets.items.lvl1[0].src = 'unicorn_sprite.png'; assets.items.lvl1[1].src = 'star_sprite.png'; assets.items.lvl1[2].src = 'heart_sprite.png';
    assets.items.lvl2[0].src = 'candy1.png'; assets.items.lvl2[1].src = 'candy2.png'; assets.items.lvl2[2].src = 'candy3.png';
    assets.items.lvl3[0].src = 'zebra_sprite.png'; assets.items.lvl3[1].src = 'giraffe_sprite.png'; assets.items.lvl3[2].src = 'monkey_sprite.png';
    assets.items.lvl4[0].src = 'planet_sprite.png'; assets.items.lvl4[1].src = 'alien_sprite.png'; assets.items.lvl4[2].src = 'unicorn_sprite.png';
    assets.items.lvl5[0].src = 'kitten_sprite.png'; assets.items.lvl5[1].src = 'yarnball_sprite.png'; assets.items.lvl5[2].src = 'kitten_sprite2.png';

    // LJUD
    const fartSounds = [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')];
    const wowSound = new Audio('wow.m4a'), braJobbatSound = new Audio('brajobbat.m4a'), megaBajsSound = new Audio('baaaajs.m4a');
    const nextLevelSound = new Audio('nextlevel.mp3'), buttonSound = new Audio('button.mp3'), chokladSound = new Audio('choklad.m4a'), neighSound = new Audio('neigh.m4a');
    const superpruttSound = new Audio('superprutt.m4a'), yeahSound = new Audio('yeah.m4a'), mjauSound = new Audio('mjau.m4a');
    const winSound = new Audio('win.mp3'); // NYTT LJUD!

    let audioCtx, gainNode, gameMusic, currentMusicFile = 'music.mp3';
    let collectables = [], particles = [], spawnTimer = 0;

    // LEVEL SELECTOR
    window.selectLevel = function(num) {
        currentLevel = num;
        document.querySelectorAll('.lvl-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.lvl-btn')[num-1].classList.add('active');
        const musicFiles = ['music.mp3', 'music2.mp3', 'music3.mp3', 'music4.mp3', 'music5.mp3', 'music6.mp3'];
        currentMusicFile = musicFiles[num-1];
        if(gameMusic) gameMusic.src = currentMusicFile;
        playSound(buttonSound);
    }

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain(); gainNode.connect(audioCtx.destination);
            gameMusic = new Audio(currentMusicFile); gameMusic.loop = true;
            const source = audioCtx.createMediaElementSource(gameMusic); source.connect(gainNode);
        }
        gainNode.gain.value = volumeSlider.value;
    }

    function playSound(s) { s.currentTime = 0; s.play().catch(()=>{}); }

    function resize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        rotateMessage.style.display = (h > w && /Android|iPhone/i.test(navigator.userAgent)) ? "flex" : "none";
        const colors = ["#87CEEB", "#ffb6c1", "#90ee90", "#0b0b16", "#ffe0f0", "#1a1a1a"];
        canvas.style.backgroundColor = colors[currentLevel-1];
        groundY = (currentLevel === 1) ? h * 0.75 : (currentLevel === 2) ? h * 0.85 : (currentLevel === 3) ? h * 0.82 : (currentLevel === 4) ? h * 0.80 : (currentLevel === 5) ? h * 0.82 : h * 0.85;
        playerSize = Math.min(w, h) * 0.25; itemSize = playerSize * 0.75;
        bgScale = groundY / (h * 0.65);
        if(!transitioning) { player.x = w * 0.22; player.y = groundY - playerSize; }
        player.gravity = h * 0.0024; player.jumpPower = h * -0.044;
    }

    function startGame() {
        initAudio(); 
        if(gameStartTime === 0) gameStartTime = Date.now();
        gameActive = true; transitioning = false;
        startMenu.style.display = "none"; levelMenu.style.display = "none"; winScreen.style.display = "none";
        resize(); playSound(wowSound); gameMusic.play();
    }

    function triggerTransition() {
        gameActive = false; transitioning = true; gameMusic.pause(); playSound(nextLevelSound);
        const anim = setInterval(() => { player.x += 20; if(player.x > w + 200) { clearInterval(anim); showMenu(); }}, 20);
    }

    function showMenu() {
        levelMenu.style.display = "flex";
        let next = currentLevel + 1; document.getElementById("level-title").innerText = `LEVEL ${next}`;
        const descs = ["Sötsug? Välkommen till Godislandet!", "Nu drar vi till Djurparken!", "Redo för rymden, rymdbajs?", "Kawaii! Välkommen till Regnbågslandet!", "Dags att möta TOALETT-KUNGEN!"];
        document.getElementById("level-desc").innerText = descs[currentLevel-1];
        const musicFiles = ['music2.mp3', 'music3.mp3', 'music4.mp3', 'music5.mp3', 'music6.mp3'];
        currentMusicFile = musicFiles[currentLevel-1];
        gameMusic.src = currentMusicFile;
    }

    // FET VINSTFUNKTION
    function triggerWin() {
        gameActive = false; transitioning = true;
        gameMusic.pause();
        playSound(winSound); // Spela win.mp3
        
        // Uppdatera Highscore
        if(currentSeconds < bestTime) {
            bestTime = currentSeconds;
            localStorage.setItem("skateBajsBestTime", bestTime);
        }
        
        // Visa skärm och tid
        document.getElementById("final-time").innerText = `Tid: ${currentSeconds} sek`;
        winScreen.style.display = "flex";
        
        // Skapa retro glitter
        createGlitter();
    }

    function createGlitter() {
        const colors = ['#f1c40f', '#fff', '#d35400', '#ffb6c1', '#87CEEB'];
        for(let i=0; i<100; i++) {
            const p = document.createElement('div');
            p.classList.add('glitter-particle');
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * -100 + 'vh';
            p.style.background = colors[Math.floor(Math.random()*colors.length)];
            p.style.animationDuration = (Math.random() * 3 + 2) + 's';
            p.style.animationDelay = Math.random() * 2 + 's';
            p.style.opacity = Math.random();
            winScreen.appendChild(p);
        }
    }

    document.getElementById("start-btn-menu").addEventListener("click", () => { playSound(buttonSound); startGame(); });
    document.getElementById("go-btn").addEventListener("click", () => { playSound(buttonSound); currentLevel++; startGame(); });

    let player = { x: 0, y: 0, velocityY: 0, gravity: 0, jumpPower: 0, isJumping: false };

    function jump() {
        if(gameActive) {
            if(!player.isJumping) {
                player.velocityY = player.jumpPower; player.isJumping = true; 
                playSound(fartSounds[Math.floor(Math.random()*3)]);
            } else if(currentLevel === 6) {
                // TRICK! Bajsen roterar i luften på Boss-leveln
                playerRotation += 360;
                isDoingTrick = true;
                playSound(superpruttSound);
                // Skada bossen om man gör ett trick nära den!
                if(player.x > w * 0.5) {
                    bossHealth -= 10;
                    for(let b=0; b<20; b++) particles.push({ x: bossX + playerSize, y: bossY + playerSize, vx: (Math.random()-0.5)*20, vy: (Math.random()-0.5)*20, s: 5, c: 'white', l: 1 });
                }
            }
        }
    }

    window.addEventListener("mousedown", (e) => { if(gameActive && e.target.tagName === 'CANVAS') jump(); });
    window.addEventListener("touchstart", (e) => { if(gameActive && e.target.tagName === 'CANVAS') { e.preventDefault(); jump(); } }, {passive: false});
    window.addEventListener("keydown", (e) => { if(e.code === "Space") jump(); });

    function gameLoop() {
        ctx.clearRect(0, 0, w, h);
        let currentBG = assets['bg'+currentLevel];
        let speed = boostTimer > 0 ? bgSpeed * 2 : bgSpeed;
        if(boostTimer > 0) boostTimer--;
        if(gameActive) currentSeconds = Math.floor((Date.now() - gameStartTime) / 1000);

        bgScroll -= speed; if(bgScroll <= -w * bgScale) bgScroll = 0;
        ctx.drawImage(currentBG, bgScroll, -h*0.1, w * bgScale, h * bgScale);
        ctx.drawImage(currentBG, bgScroll + w * bgScale, -h*0.1, w * bgScale, h * bgScale);
        
        if (gameActive) {
            player.velocityY += player.gravity; player.y += player.velocityY;
            
            // Halfpipe känsla på marken (Level 6)
            let currentGroundY = groundY;
            if(currentLevel === 6) {
                currentGroundY = groundY - Math.abs(Math.sin(Date.now()*0.002)) * 30; // Svag kurva
            }

            if(player.y > (currentGroundY - playerSize)) { 
                player.y = currentGroundY - playerSize; 
                player.velocityY = 0; player.isJumping = false; 
                playerRotation = 0; isDoingTrick = false; // Återställ tricks vid landning
            }
            
            // SPAWN LOGIK
            spawnTimer++;
            if(spawnTimer > 50) {
                if(currentLevel === 6) {
                    // Boss attackerar med toalettpapper
                    bossX = w * 0.7; bossY = h * 0.3 + Math.sin(Date.now()*0.005) * 50; // Flyter runt
                    if(Math.random() < 0.3) {
                        collectables.push({ x: bossX, y: bossY + 100, sW: 60, sH: 60, typeIdx: 0, isPaper: true });
                    }
                } else {
                    // Vanlig spawn
                    let isGold = Math.random() < 0.05;
                    let imgSet = assets.items['lvl'+currentLevel];
                    let typeIdx = Math.floor(Math.random()*imgSet.length);
                    let img = isGold ? assets.gold : imgSet[typeIdx];
                    let sW = isGold ? itemSize * 1.5 : itemSize;
                    let sH = sW;
                    if(img && img.complete) sH = sW * (img.naturalHeight/img.naturalWidth);
                    collectables.push({ x: w, y: groundY - sH - Math.random()*(h*0.4), sW, sH, typeIdx, isGold });
                }
                spawnTimer = 0;
            }

            // KOLLISIONS LOGIK
            for(let i = collectables.length-1; i>=0; i--) {
                let c = collectables[i]; 
                c.x -= c.isPaper ? speed * 1.5 : speed; // Papper flyger snabbare
                if(player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                    if(c.isGold) {
                        gameStartTime += 5000;
                        for(let b=0; b<30; b++) particles.push({ x: c.x, y: c.y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, s: 8, c: '#f1c40f', l: 1 });
                        playSound(yeahSound);
                    } else if(c.isPaper) {
                        // Träffad av papper - ingen poäng, bara partiklar (kan lägga till minuspoäng här sen)
                        for(let b=0; b<10; b++) particles.push({ x: player.x, y: player.y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, s: 4, c: '#eee', l: 0.5 });
                    } else {
                        itemsCollected++;
                        // BOOST LOGIK
                        if((currentLevel === 3 && c.typeIdx === 2) || (currentLevel === 4 && c.typeIdx === 1) || (currentLevel === 5 && (c.typeIdx === 0 || c.typeIdx === 2))) {
                            boostTimer = 120;
                            if(currentLevel === 5 && c.typeIdx === 0) playSound(mjauSound);
                            else playSound(superpruttSound);
                        }
                        // Andra ljud
                        if(currentLevel === 2 && c.typeIdx === 0) playSound(chokladSound);
                        if(currentLevel === 4 && c.typeIdx === 2) playSound(neighSound);
                        if(itemsCollected % 12 === 0) playSound(braJobbatSound);
                        // Bajsfest
                        if(itemsCollected > 0 && itemsCollected % 25 === 0) {
                             playSound(megaBajsSound);
                             setTimeout(() => { if (gameActive) { for(let b=0; b<120; b++) particles.push({ x: player.x + playerSize/2, y: player.y + playerSize/2, vx: (Math.random()-0.5)*30, vy: (Math.random()-1.2)*25, s: Math.random()*15 + 4, c: '#8B4513', l: 1.5 + Math.random() }); } }, 3500); 
                        }
                    }
                    // Mål och Nivåbyte
                    let goal = currentLevel === 1 ? 30 : currentLevel === 2 ? 60 : currentLevel === 3 ? 90 : currentLevel === 4 ? 130 : 180;
                    if(currentLevel < 6 && itemsCollected === goal) triggerTransition();
                    collectables.splice(i,1);
                }
                if(c.x < -200) collectables.splice(i,1);
            }
        }
        
        // RITA FÖREMÅL OCH BOSS
        collectables.forEach(c => {
            ctx.save();
            if(c.isGold) { ctx.shadowBlur = 25; ctx.shadowColor = "gold"; }
            else if(currentLevel === 5 && (c.typeIdx === 0 || c.typeIdx === 2)) { ctx.shadowBlur = 20; ctx.shadowColor = "#ffe0f0"; }
            else if(currentLevel === 3) { ctx.shadowBlur = 15; ctx.shadowColor = "white"; }
            
            if(c.isPaper) {
                ctx.drawImage(assets.paper, c.x, c.y, c.sW, c.sH);
            } else {
                let imgSet = assets.items['lvl'+currentLevel];
                let img = c.isGold ? assets.gold : imgSet[c.typeIdx];
                if(img && img.complete) ctx.drawImage(img, c.x, c.y, c.sW, c.sH);
            }
            ctx.restore();
        });

        // BOSS-STRID LOGIK (Level 6)
        if(gameActive && currentLevel === 6) {
            ctx.drawImage(assets.boss, bossX, bossY, playerSize * 2, playerSize * 2);
            // Healthbar
            ctx.fillStyle = "red"; ctx.fillRect(bossX, bossY - 30, (playerSize * 2), 20);
            ctx.fillStyle = "green"; ctx.fillRect(bossX, bossY - 30, (playerSize * 2) * (bossHealth / 100), 20);
            if(bossHealth <= 0) triggerWin(); // DU VANN!
        }

        // RITA SPELARE MED ROTATION
        ctx.save();
        ctx.translate(player.x + playerSize/2, player.y + playerSize/2);
        if(currentLevel === 6) ctx.rotate(playerRotation * Math.PI / 180);
        
        if (boostTimer > 0) {
            let fireW = playerSize * 0.95, fireH = fireW * (assets.fire.naturalHeight / assets.fire.naturalWidth || 1);
            ctx.drawImage(assets.fire, -playerSize/2 - fireW * 0.70, playerSize * 0.45 - fireH, fireW, fireH);
        }
        ctx.drawImage(assets.player, -playerSize/2, -playerSize/2, playerSize, playerSize);
        ctx.restore();
        
        // Partiklar och UI
        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.l -= 0.02; ctx.globalAlpha = Math.max(0, p.l); ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill(); if(p.l <= 0) particles.splice(i,1); });
        ctx.globalAlpha = 1;

        if (gameActive) {
            ctx.fillStyle = "white"; ctx.font = "bold 20px Courier";
            ctx.fillText(`⏱️ ${currentSeconds}s`, 30, 40);
            if(currentLevel < 6) {
                let g = currentLevel === 1 ? 30 : currentLevel === 2 ? 60 : currentLevel === 3 ? 90 : currentLevel === 4 ? 130 : 180;
                ctx.fillText(`✨ ${itemsCollected}/${g}`, 30, 70);
            } else {
                ctx.fillText(`👿 BOSS FIGHT`, 30, 70);
            }
            ctx.fillText(`LVL ${currentLevel === 6 ? '🔥' : currentLevel}`, 30, 100);
        }
        requestAnimationFrame(gameLoop);
    }
    window.addEventListener('resize', resize);
    resize(); gameLoop();
</script>
</body>
</html>
