<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skate-bajsen</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #ffb6c1; 
            background-image: 
                linear-gradient(45deg, #ffc0cb 25%, transparent 25%), 
                linear-gradient(-45deg, #ffc0cb 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ffc0cb 75%),
                linear-gradient(-45deg, transparent 75%, #ffc0cb 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
            display: flex; 
            flex-direction: column; 
            justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: manipulation;
        }
        
        #game-container {
            position: relative;
            width: 95vw;
            max-width: 1200px;
            aspect-ratio: 2 / 1; 
            overflow: hidden;
            border: 8px solid #1a252f;
            border-radius: 8px;
            box-shadow: 0px 15px 45px rgba(0,0,0,0.6);
        }

        canvas { display: block; width: 100%; height: 100%; background-color: #87CEEB; transition: background-color 1s; }
        
        /* DISKRET MUTE-KNAPP PÅ ROSA BAKGRUND */
        .game-btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            color: #888; /* Ännu lite diskretare grå */
            background-color: transparent;
            border: 2px solid #888;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .game-btn:hover { color: #fff; border-color: #fff; background-color: rgba(255,255,255,0.1); }

        #ui-layer {
            margin-top: 15px; 
            width: 95vw;
            max-width: 1200px;
            display: flex;
            justify-content: flex-end; 
            z-index: 30;
        }

        #start-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center; z-index: 10;
        }
        
        #start-btn-menu {
            padding: 20px 40px; font-size: 32px;
            background-color: #f1c40f; border: 5px solid #000; color: #000;
            box-shadow: 8px 8px 0px #d35400; text-transform: uppercase; margin-top: 30px;
            cursor: pointer;
        }

        h1 { font-size: clamp(40px, 8vw, 90px); color: #fff; text-shadow: 6px 6px 0px #d35400; margin: 0; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="start-menu">
        <h1>SKATE-BAJSEN</h1>
        <p>Varje 25:e poäng blir det bajsfest!</p>
        <button id="start-btn-menu">STARTA SPELET!</button>
    </div>
</div>

<div id="ui-layer">
    <button id="mute-btn" class="game-btn">🔊 Ljud På</button>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startMenu = document.getElementById("start-menu");
    const startBtnMenu = document.getElementById("start-btn-menu");
    const muteBtn = document.getElementById("mute-btn");

    canvas.width = 1200; canvas.height = 600; 
    const groundY = 540; 
    let gameActive = false;
    let itemsCollected = 0;
    let totalItemsSpawned = 0; 
    let level = 1;
    let isMuted = false;
    const bgSpeed = 6; 

    const skyColors = ['#87CEEB', '#98FB98', '#DDA0DD', '#FFFACD']; 

    const backgroundImage = new Image(); backgroundImage.src = 'pixel_background.png'; 
    const playerImage = new Image(); playerImage.src = 'bajskorv_sprite.png';
    const itemImages = { unicorn: new Image(), star: new Image(), heart: new Image() };
    itemImages.unicorn.src = 'unicorn_sprite.png';
    itemImages.star.src = 'star_sprite.png';
    itemImages.heart.src = 'heart_sprite.png';

    const fartSounds = [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')];
    const neighSound = new Audio('neigh.m4a'); 
    const braJobbatSound = new Audio('brajobbat.m4a'); 
    const wowSound = new Audio('wow.m4a');             
    const megaBajsSound = new Audio('baaaajs.m4a');
    const bgMusic = new Audio('music.mp3');
    bgMusic.volume = 0.2; bgMusic.loop = true; 

    let bgScroll = 0;
    let player = { x: 120, y: groundY - 180, height: 180, jumpPower: -22, velocityY: 0, gravity: 0.95, isJumping: false };
    let collectables = [];
    let particles = [];
    let spawnTimer = 0;

    function playSound(sound) {
        if (!isMuted) {
            sound.currentTime = 0;
            sound.play().catch(e => {});
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        muteBtn.innerText = isMuted ? "🔇 Ljud Av" : "🔊 Ljud På";
        if (isMuted) bgMusic.pause();
        else if (gameActive) bgMusic.play();
    }

    function createExplosion(x, y, color) {
        for (let i = 0; i < 20; i++) {
            particles.push({
                x: x, y: y, vx: (Math.random() - 0.5) * 12, vy: (Math.random() - 0.5) * 12,
                size: Math.random() * 6 + 3, color: color, life: 1.0
            });
        }
    }

    function startGame() {
        gameActive = true;
        startMenu.style.display = "none";
        if (!isMuted) bgMusic.play().catch(e => {});
    }

    // Stoppa klick på Mute från att trigga hopp
    muteBtn.addEventListener("click", (e) => { e.stopPropagation(); toggleMute(); });
    startBtnMenu.addEventListener("click", (e) => { e.stopPropagation(); startGame(); });

    function handleJump() {
        if (!gameActive) startGame();
        else if (!player.isJumping) {
            player.velocityY = player.jumpPower;
            player.isJumping = true;
            if (megaBajsSound.paused || megaBajsSound.ended) {
                const randomFart = fartSounds[Math.floor(Math.random() * fartSounds.length)];
                playSound(randomFart);
            }
        }
    }

    document.addEventListener("keydown", (e) => { if(e.code === "Space") { e.preventDefault(); handleJump(); } });
    canvas.addEventListener("touchstart", (e) => { e.preventDefault(); handleJump(); }, {passive: false});

    function gameLoop() {
        if (gameActive) {
            bgScroll -= bgSpeed;
            if(bgScroll <= -canvas.width) bgScroll = 0;
            player.velocityY += player.gravity;
            player.y += player.velocityY;
            if(player.y > (groundY - player.height)) { player.y = groundY - player.height; player.velocityY = 0; player.isJumping = false; }

            spawnTimer++;
            if(spawnTimer > 65) { 
                totalItemsSpawned++;
                const types = ['unicorn', 'star', 'heart'];
                const randomType = types[Math.floor(Math.random() * types.length)];
                let isBoss = (totalItemsSpawned % 7 === 0);
                let size = isBoss ? 180 : 90;
                collectables.push({ x: canvas.width, y: groundY - size - 40 - Math.random() * 180, height: size, type: randomType, isBoss: isBoss });
                spawnTimer = 0;
            }

            for(let i = collectables.length - 1; i >= 0; i--) {
                collectables[i].x -= bgSpeed; 
                let img = itemImages[collectables[i].type];
                let ratio = img.width / img.height;
                let currentWidth = collectables[i].height * ratio;
                let pad = 35; 
                let pWidth = player.height * (playerImage.width / playerImage.height);

                if (player.x + pad < collectables[i].x + currentWidth - pad && 
                    player.x + pWidth - pad > collectables[i].x + pad &&
                    player.y < collectables[i].y + collectables[i].height - pad && 
                    player.y + player.height - pad > collectables[i].y + pad) {
                    
                    createExplosion(collectables[i].x + currentWidth/2, collectables[i].y + collectables[i].height/2, collectables[i].type === 'heart' ? '#ff4d4d' : '#ffff00');
                    itemsCollected++;

                    if (itemsCollected > 0 && itemsCollected % 25 === 0) {
                        playSound(megaBajsSound);
                        setTimeout(() => {
                            if (gameActive) {
                                const randomFart = fartSounds[Math.floor(Math.random() * fartSounds.length)];
                                playSound(randomFart);
                                for (let b = 0; b < 150; b++) { 
                                    particles.push({ x: player.x + 60, y: player.y + 160, vx: (Math.random() - 0.3) * 20, vy: (Math.random() - 0.8) * 30, size: Math.random() * 12 + 5, color: '#8B4513', life: 2.5 });
                                }
                                for (let g = 0; g < 100; g++) {
                                    particles.push({ x: player.x + 60, y: player.y + 160, vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.9) * 35, size: Math.random() * 6 + 2, color: '#FFD700', life: 3.0 });
                                }
                            }
                        }, 3000); 
                    }
                    
                    if (megaBajsSound.paused || megaBajsSound.ended) {
                        if (collectables[i].isBoss) playSound(wowSound);
                        else if (itemsCollected % 12 === 0) playSound(braJobbatSound);
                        else if (collectables[i].type === 'unicorn') playSound(neighSound);
                    }
                    
                    collectables.splice(i, 1);
                    if(itemsCollected % 5 === 0) { level++; canvas.style.backgroundColor = skyColors[(level - 1) % skyColors.length]; }
                    continue; 
                }
                if(collectables[i].x < -300) collectables.splice(i, 1);
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx; particles[i].y += particles[i].vy;
                particles[i].vy += 0.25; particles[i].life -= 0.015;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(backgroundImage, bgScroll, 0, canvas.width, canvas.height);
        ctx.drawImage(backgroundImage, bgScroll + canvas.width, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#333333"; ctx.fillRect(0, canvas.height - 180, canvas.width, 180);
        ctx.fillStyle = "#ffffff";
        for(let i = 0; i < canvas.width + 200; i += 200) { ctx.fillRect(i + (bgScroll % 200), canvas.height - 90, 100, 15); }

        let pRatio = playerImage.width / playerImage.height;
        ctx.drawImage(playerImage, player.x, player.y, player.height * pRatio, player.height);

        collectables.forEach(c => {
            let img = itemImages[c.type];
            let ratio = img.width / img.height;
            ctx.drawImage(img, c.x, c.y, c.height * ratio, c.height);
        });

        particles.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        if (gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(20, 20, 320, 100);
            ctx.fillStyle = "white"; ctx.font = "bold 32px 'Courier New'";
            ctx.fillText("✨ Samlade: " + itemsCollected, 40, 60);
            ctx.fillStyle = "gold"; ctx.fillText("⭐ LEVEL: " + level, 40, 100);
        }
        requestAnimationFrame(gameLoop);
    }
    
    let imgCount = 0;
    function count() { imgCount++; if(imgCount === 5) gameLoop(); }
    backgroundImage.onload = count; playerImage.onload = count;
    itemImages.unicorn.onload = count; itemImages.star.onload = count; itemImages.heart.onload = count;
</script>
</body>
</html>
