<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Skate-bajsen: Chill Music Edition</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; transition: background-color 1s; }
        #start-menu, #level-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .game-btn-large { padding: 25px 50px; font-size: 32px; background-color: #f1c40f; border: 6px solid #000; box-shadow: 10px 10px 0px #d35400; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; }
        .level-selector { display: flex; gap: 10px; margin: 15px 0; }
        .lvl-btn { width: 50px; height: 50px; background: #333; border: 3px solid #f1c40f; color: white; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .lvl-btn.active { background: #f1c40f; color: black; box-shadow: 0 0 15px #f1c40f; }
        #ui-layer { position: absolute; bottom: 30px; right: 30px; z-index: 50; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas" tabindex="1"></canvas>
    
    <div id="start-menu">
        <h1>SKATE-BAJSEN</h1>
        <div class="level-selector">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>
        <button id="start-btn-menu" class="game-btn-large">LETS GO!</button>
    </div>

    <div id="level-menu" style="display:none;">
        <h1 id="level-title">NÄSTA NIVÅ</h1>
        <button id="go-btn" class="game-btn-large">LETS GO!</button>
    </div>

    <div id="ui-layer">
        <input type="range" id="volume-slider" min="0" max="0.5" step="0.01" value="0.1">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const startMenu = document.getElementById("start-menu"), levelMenu = document.getElementById("level-menu");
    const volumeSlider = document.getElementById("volume-slider");

    let gameActive = false, currentLevel = 1, bgScroll = 0, itemsCollected = 0;
    let w, h, groundY, playerSize, itemSize, bgSpeed = 7, bgScale, boostTimer = 0;

    const assets = {
        bg1: new Image(), bg2: new Image(), bg3: new Image(), bg4: new Image(), bg5: new Image(), bg6: new Image(), player: new Image(), fire: new Image(),
        items: { lvl1: [], lvl2: [], lvl3: [], lvl4: [], lvl5: [] }
    };
    assets.bg1.src = 'pixel_background.png'; assets.bg2.src = 'pixel_background2.png'; assets.bg3.src = 'pixel_background3.png'; assets.bg4.src = 'pixel_background4.png'; assets.bg5.src = 'pixel_background5.png'; assets.bg6.src = 'pixel_background6.png';
    assets.player.src = 'bajskorv_sprite.png'; assets.fire.src = 'fire_sprite.png';
    
    function loadLvl(lvl, img1, img2, img3) {
        const a1 = new Image(); a1.src = img1;
        const a2 = new Image(); a2.src = img2;
        const a3 = new Image(); a3.src = img3;
        assets.items['lvl'+lvl] = [a1, a2, a3];
    }
    loadLvl(1, 'unicorn_sprite.png', 'star_sprite.png', 'heart_sprite.png');
    loadLvl(2, 'candy1.png', 'candy2.png', 'candy3.png');
    loadLvl(3, 'zebra_sprite.png', 'giraffe_sprite.png', 'monkey_sprite.png');
    loadLvl(4, 'planet_sprite.png', 'alien_sprite.png', 'unicorn_sprite.png');
    loadLvl(5, 'kitten_sprite.png', 'yarnball_sprite.png', 'kitten_sprite2.png');

    const fartSounds = [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')];
    const wowSound = new Audio('wow.m4a'), mjauSound = new Audio('mjau.m4a'), buttonSound = new Audio('button.mp3');

    let gameMusic = new Audio();
    gameMusic.loop = true;
    let currentMusicFile = 'music.mp3';

    window.selectLevel = function(num) {
        currentLevel = num;
        document.querySelectorAll('.lvl-btn').forEach((btn, i) => btn.classList.toggle('active', i === num-1));
        
        // SPECIAL: Om det är Level 5, använd musiken från Level 1 istället
        if (num === 5) {
            currentMusicFile = 'music.mp3';
        } else {
            const tracks = ['music.mp3', 'music2.mp3', 'music3.mp3', 'music4.mp3', 'music5.mp3', 'music6.mp3'];
            currentMusicFile = tracks[num-1];
        }
        
        gameMusic.src = currentMusicFile;
        playSound(buttonSound);
    }

    function playSound(s) { 
        s.currentTime = 0; 
        s.volume = volumeSlider.value; 
        s.play().catch(()=>{}); 
    }

    function resize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        const colors = ["#87CEEB", "#ffb6c1", "#90ee90", "#0b0b16", "#ffe0f0", "#1a1a1a"];
        canvas.style.backgroundColor = colors[currentLevel-1];
        groundY = h * 0.8;
        playerSize = Math.min(w, h) * 0.22; itemSize = playerSize * 0.7;
        bgScale = groundY / (h * 0.65);
        player.x = w * 0.2; player.y = groundY - playerSize;
        player.gravity = h * 0.0024; player.jumpPower = h * -0.045;
    }

    let player = { x: 0, y: 0, velocityY: 0, gravity: 0, jumpPower: 0, isJumping: false };

    function jump() {
        if(gameActive && !player.isJumping) {
            player.velocityY = player.jumpPower; player.isJumping = true; 
            playSound(fartSounds[Math.floor(Math.random()*3)]);
        }
    }

    window.addEventListener("mousedown", () => { if(gameActive) jump(); });
    window.addEventListener("touchstart", (e) => { if(gameActive) { e.preventDefault(); jump(); } }, {passive: false});

    function startGame() {
        resize();
        gameActive = true;
        startMenu.style.display = "none";
        
        if(!gameMusic.src || gameMusic.src === "") gameMusic.src = currentMusicFile;
        gameMusic.volume = volumeSlider.value;
        gameMusic.play();
        playSound(wowSound);
    }

    volumeSlider.oninput = () => {
        if(gameMusic) gameMusic.volume = volumeSlider.value;
    };

    document.getElementById("start-btn-menu").onclick = startGame;

    let collectables = [], spawnTimer = 0;

    function gameLoop() {
        ctx.clearRect(0, 0, w, h);
        let bg = assets['bg'+currentLevel];
        let speed = boostTimer > 0 ? bgSpeed * 2 : bgSpeed;
        if(boostTimer > 0) boostTimer--;

        if(bg.complete) {
            bgScroll -= speed * 0.5; if(bgScroll <= -w * bgScale) bgScroll = 0;
            ctx.drawImage(bg, bgScroll, 0, w * bgScale, h * bgScale);
            ctx.drawImage(bg, bgScroll + w * bgScale, 0, w * bgScale, h * bgScale);
        }
        
        if (gameActive) {
            player.velocityY += player.gravity; player.y += player.velocityY;
            if(player.y > (groundY - playerSize)) { player.y = groundY - playerSize; player.velocityY = 0; player.isJumping = false; }
            
            spawnTimer++;
            if(spawnTimer > 50) {
                let imgSet = assets.items['lvl'+currentLevel];
                if(imgSet && imgSet.length > 0) {
                    let typeIdx = Math.floor(Math.random()*imgSet.length);
                    collectables.push({ x: w, y: groundY - itemSize - Math.random()*200, sW: itemSize, sH: itemSize, typeIdx });
                }
                spawnTimer = 0;
            }

            for(let i = collectables.length-1; i>=0; i--) {
                let c = collectables[i]; c.x -= speed;
                if(player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                    itemsCollected++;
                    if(currentLevel === 5 && c.typeIdx === 0) playSound(mjauSound);
                    collectables.splice(i,1);
                }
                if(c.x < -200) collectables.splice(i,1);
            }
        }
        
        collectables.forEach(c => {
            let img = assets.items['lvl'+currentLevel][c.typeIdx];
            if(img && img.complete) ctx.drawImage(img, c.x, c.y, c.sW, c.sH);
        });

        ctx.drawImage(assets.player, player.x, player.y, playerSize, playerSize);
        requestAnimationFrame(gameLoop);
    }

    window.onresize = resize;
    resize(); gameLoop();
</script>
</body>
</html>
