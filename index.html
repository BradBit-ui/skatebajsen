<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skate-bajsen</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #ffb6c1; 
            background-image: 
                linear-gradient(45deg, #ffc0cb 25%, transparent 25%), 
                linear-gradient(-45deg, #ffc0cb 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ffc0cb 75%),
                linear-gradient(-45deg, transparent 75%, #ffc0cb 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; font-family: 'Courier New', Courier, monospace;
            overflow: hidden; touch-action: none;
        }
        
        #game-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        canvas { 
            display: block; 
            max-width: 100%; max-height: 100%;
            background-color: #87CEEB; 
            transition: background-color 1s;
            box-shadow: 0px 0px 50px rgba(0,0,0,0.3);
        }
        
        #ui-layer {
            position: absolute;
            bottom: 20px; right: 20px;
            z-index: 30;
            padding-bottom: env(safe-area-inset-bottom); /* För iPhone-strecket */
            padding-right: env(safe-area-inset-right);
        }

        .game-btn {
            padding: 10px 15px; font-size: 12px; font-weight: bold;
            color: #555; background-color: rgba(255,255,255,0.7);
            border: 2px solid #555; cursor: pointer; text-transform: uppercase;
        }

        #start-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center; z-index: 40;
        }
        
        #start-btn-menu {
            padding: 20px 40px; font-size: 28px;
            background-color: #f1c40f; border: 5px solid #000; color: #000;
            box-shadow: 8px 8px 0px #d35400; text-transform: uppercase; cursor: pointer;
        }

        h1 { font-size: 15vw; max-size: 80px; color: #fff; text-shadow: 4px 4px 0px #d35400; margin: 0; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-menu">
        <h1>SKATE-BAJSEN</h1>
        <p>Tryck var som helst för att hoppa!</p>
        <button id="start-btn-menu">STARTA!</button>
    </div>

    <div id="ui-layer">
        <button id="mute-btn" class="game-btn">🔊 LJUD PÅ</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startMenu = document.getElementById("start-menu");
    const startBtnMenu = document.getElementById("start-btn-menu");
    const muteBtn = document.getElementById("mute-btn");

    let gameActive = false;
    let itemsCollected = 0;
    let totalItemsSpawned = 0; 
    let level = 1;
    let isMuted = false;
    let bgScroll = 0;
    
    // Dynamiska värden baserat på skärmstorlek
    let w, h, groundY, playerSize, bgSpeed;
    
    function resize() {
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w;
        canvas.height = h;
        groundY = h * 0.85;
        playerSize = Math.min(w, h) * 0.25;
        bgSpeed = w * 0.008;
    }
    window.addEventListener('resize', resize);
    resize();

    const skyColors = ['#87CEEB', '#98FB98', '#DDA0DD', '#FFFACD']; 
    const backgroundImage = new Image(); backgroundImage.src = 'pixel_background.png'; 
    const playerImage = new Image(); playerImage.src = 'bajskorv_sprite.png';
    const itemImages = { unicorn: new Image(), star: new Image(), heart: new Image() };
    itemImages.unicorn.src = 'unicorn_sprite.png';
    itemImages.star.src = 'star_sprite.png';
    itemImages.heart.src = 'heart_sprite.png';

    const fartSounds = [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')];
    const neighSound = new Audio('neigh.m4a'), braJobbatSound = new Audio('brajobbat.m4a'); 
    const wowSound = new Audio('wow.m4a'), megaBajsSound = new Audio('baaaajs.m4a');
    const bgMusic = new Audio('music.mp3');
    bgMusic.volume = 0.2; bgMusic.loop = true; 

    let player = { x: 50, y: 0, velocityY: 0, gravity: 0, jumpPower: 0, isJumping: false };
    let collectables = [], particles = [], spawnTimer = 0;

    function playSound(sound) { if (!isMuted) { sound.currentTime = 0; sound.play().catch(e=>{}); } }

    function resetPlayer() {
        player.y = groundY - playerSize;
        player.gravity = h * 0.0015;
        player.jumpPower = h * -0.035;
    }

    function startGame() {
        gameActive = true;
        startMenu.style.display = "none";
        resetPlayer();
        if (!isMuted) bgMusic.play().catch(e=>{});
    }

    muteBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        isMuted = !isMuted;
        muteBtn.innerText = isMuted ? "🔇 LJUD AV" : "🔊 LJUD PÅ";
        if (isMuted) bgMusic.pause(); else if (gameActive) bgMusic.play();
    });

    startBtnMenu.addEventListener("click", (e) => { e.stopPropagation(); startGame(); });

    function handleJump() {
        if (!gameActive) startGame();
        else if (!player.isJumping) {
            player.velocityY = player.jumpPower;
            player.isJumping = true;
            if (megaBajsSound.paused) playSound(fartSounds[Math.floor(Math.random() * fartSounds.length)]);
        }
    }

    window.addEventListener("keydown", (e) => { if(e.code === "Space") handleJump(); });
    window.addEventListener("touchstart", (e) => { if(e.target.tagName !== 'BUTTON') handleJump(); });

    function gameLoop() {
        ctx.clearRect(0, 0, w, h);
        
        if (gameActive) {
            bgScroll -= bgSpeed;
            if(bgScroll <= -w) bgScroll = 0;
            player.velocityY += player.gravity;
            player.y += player.velocityY;
            if(player.y > groundY - playerSize) { player.y = groundY - playerSize; player.velocityY = 0; player.isJumping = false; }

            spawnTimer++;
            if(spawnTimer > 60) {
                totalItemsSpawned++;
                let type = ['unicorn', 'star', 'heart'][Math.floor(Math.random()*3)];
                let isBoss = totalItemsSpawned % 7 === 0;
                let s = isBoss ? playerSize : playerSize * 0.5;
                collectables.push({ x: w, y: groundY - s - Math.random()*(h*0.3), size: s, type, isBoss });
                spawnTimer = 0;
            }

            for(let i = collectables.length-1; i>=0; i--) {
                let c = collectables[i];
                c.x -= bgSpeed;
                if(c.x + c.size < 0) collectables.splice(i, 1);
                
                // Collision
                if(player.x < c.x + c.size*0.8 && player.x + playerSize*0.8 > c.x && player.y < c.y + c.size*0.8 && player.y + playerSize*0.8 > c.y) {
                    itemsCollected++;
                    if(itemsCollected % 25 === 0) {
                        playSound(megaBajsSound);
                        setTimeout(() => {
                            for(let b=0; b<100; b++) particles.push({ x: player.x+playerSize/2, y: player.y+playerSize/2, vx: (Math.random()-0.3)*20, vy: (Math.random()-0.8)*30, s: Math.random()*10+5, c: '#8B4513', l: 2 });
                        }, 3000);
                    }
                    if (megaBajsSound.paused) {
                        if(c.isBoss) playSound(wowSound);
                        else if(itemsCollected % 12 === 0) playSound(braJobbatSound);
                        else if(c.type === 'unicorn') playSound(neighSound);
                    }
                    collectables.splice(i,1);
                    if(itemsCollected % 5 === 0) { level++; canvas.style.backgroundColor = skyColors[(level-1)%4]; }
                }
            }
        }

        // Draw Background
        ctx.drawImage(backgroundImage, bgScroll, 0, w, groundY);
        ctx.drawImage(backgroundImage, bgScroll + w, 0, w, groundY);
        
        // Draw Road
        ctx.fillStyle = "#333"; ctx.fillRect(0, groundY, w, h - groundY);
        ctx.fillStyle = "white";
        for(let i=0; i<w+200; i+=200) ctx.fillRect(i + (bgScroll%200), groundY + (h-groundY)/2, 80, 10);

        // Draw Items
        collectables.forEach(c => ctx.drawImage(itemImages[c.type], c.x, c.y, c.size, c.size));

        // Draw Player
        ctx.drawImage(playerImage, player.x, player.y, playerSize, playerSize);

        // Particles
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.l -= 0.02;
            ctx.globalAlpha = p.l; ctx.fillStyle = p.c;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            if(p.l <= 0) particles.splice(i,1);
        });
        ctx.globalAlpha = 1;

        if (gameActive) {
            ctx.fillStyle = "rgba(0,0,0,0.6)"; 
            let uiX = 20 + envSafe('left');
            let uiY = 20 + envSafe('top');
            ctx.fillRect(uiX, uiY, 200, 80);
            ctx.fillStyle = "white"; ctx.font = "bold 20px Courier";
            ctx.fillText("✨ Samlade: " + itemsCollected, uiX + 20, uiY + 35);
            ctx.fillStyle = "gold"; ctx.fillText("⭐ LEVEL: " + level, uiX + 20, uiY + 65);
        }
        requestAnimationFrame(gameLoop);
    }
    
    function envSafe(side) { return 0; } // Förenklad för webb

    let imgCount = 0;
    function count() { imgCount++; if(imgCount === 5) gameLoop(); }
    backgroundImage.onload = count; playerImage.onload = count;
    itemImages.unicorn.onload = count; itemImages.star.onload = count; itemImages.heart.onload = count;
</script>
</body>
</html>
