<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Skate-bajsen: Fixed Proportions</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; transition: background-color 1s; }
        #start-menu, #level-menu, #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .game-btn-large { padding: 25px 50px; font-size: 32px; background-color: #f1c40f; border: 6px solid #000; box-shadow: 10px 10px 0px #d35400; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; }
        .level-selector { display: flex; gap: 10px; margin: 15px 0; }
        .lvl-btn { width: 50px; height: 50px; background: #333; border: 3px solid #f1c40f; color: white; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .lvl-btn.active { background: #f1c40f; color: black; box-shadow: 0 0 15px #f1c40f; }
        #ui-layer { position: absolute; bottom: 30px; right: 30px; z-index: 150; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-menu">
        <h1>SKATE-BAJSEN</h1>
        <div class="level-selector">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>
        <button id="start-btn-menu" class="game-btn-large">LETS GO!</button>
    </div>

    <div id="level-menu" style="display:none;">
        <h1 id="level-title">KLAR!</h1>
        <button id="go-btn" class="game-btn-large">NÄSTA NIVÅ</button>
    </div>

    <div id="win-screen" style="display:none;">
        <h1 style="color:#f1c40f;">GRATTIS!!!</h1>
        <p>SUPER BAJS-SKATAREN!</p>
        <button class="game-btn-large" onclick="location.reload()">SPELA IGEN?</button>
    </div>

    <div id="ui-layer">
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const startMenu = document.getElementById("start-menu"), levelMenu = document.getElementById("level-menu"), winScreen = document.getElementById("win-screen");
    const volumeSlider = document.getElementById("volume-slider");

    let gameActive = false, transitioning = false, itemsCollected = 0, currentLevel = 1, bgScroll = 0;
    let w, h, groundY, playerSize, itemSize, bgSpeed = 7, bgScale, boostTimer = 0;

    // Boss & Halfpipe
    let bossHealth = 100, playerRotation = 0, pipeTimer = 0, hasPaperAmmo = 0, trickTextTimer = 0, projectile = null;
    let player = { x: 0, y: 0, velocityY: 0, gravity: 0.8, jumpPower: -18, isJumping: false };

    const assets = {
        bg1: new Image(), bg2: new Image(), bg3: new Image(), bg4: new Image(), bg5: new Image(), bg6: new Image(), 
        player: new Image(), fire: new Image(), boss: new Image(), paper: new Image(), gold: new Image()
    };
    assets.bg1.src = 'pixel_background.png'; assets.bg2.src = 'pixel_background2.png'; assets.bg3.src = 'pixel_background3.png'; assets.bg4.src = 'pixel_background4.png'; assets.bg5.src = 'pixel_background5.png'; assets.bg6.src = 'pixel_background6.png';
    assets.player.src = 'bajskorv_sprite.png'; assets.fire.src = 'fire_sprite.png'; assets.boss.src = 'boss_sprite.png'; assets.paper.src = 'paper_sprite.png'; assets.gold.src = 'gold_poop.png';
    
    const items = { lvl1: [], lvl2: [], lvl3: [], lvl4: [], lvl5: [] };
    function loadLvl(lvl, img1, img2, img3) {
        const a1 = new Image(); a1.src = img1; const a2 = new Image(); a2.src = img2; const a3 = new Image(); a3.src = img3;
        items['lvl'+lvl] = [a1, a2, a3];
    }
    loadLvl(1, 'unicorn_sprite.png', 'star_sprite.png', 'heart_sprite.png');
    loadLvl(2, 'candy1.png', 'candy2.png', 'candy3.png');
    loadLvl(3, 'zebra_sprite.png', 'giraffe_sprite.png', 'monkey_sprite.png');
    loadLvl(4, 'planet_sprite.png', 'alien_sprite.png', 'unicorn_sprite.png');
    loadLvl(5, 'kitten_sprite.png', 'yarnball_sprite.png', 'kitten_sprite2.png');

    const sounds = {
        fart: [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')],
        wow: new Audio('wow.m4a'), mjau: new Audio('mjau.m4a'), button: new Audio('button.mp3'),
        hit: new Audio('hit.mp3'), win: new Audio('win.mp3'), jump: new Audio('superprutt.m4a'),
        yeah: new Audio('yeah.m4a'), mega: new Audio('baaaajs.m4a'), next: new Audio('nextlevel.mp3')
    };

    let gameMusic = new Audio();
    gameMusic.loop = true;
    let currentMusicFile = 'music.mp3';

    function playSound(s) { s.currentTime = 0; s.volume = volumeSlider.value; s.play().catch(()=>{}); }

    function selectLevel(num) {
        currentLevel = num;
        document.querySelectorAll('.lvl-btn').forEach((btn, i) => btn.classList.toggle('active', i === num-1));
        currentMusicFile = (num === 5) ? 'music.mp3' : ['music.mp3', 'music2.mp3', 'music3.mp3', 'music4.mp3', 'music5.mp3', 'music6.mp3'][num-1];
        gameMusic.src = currentMusicFile;
        playSound(sounds.button);
    }

    function resize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        const colors = ["#87CEEB", "#ffb6c1", "#90ee90", "#0b0b16", "#ffe0f0", "#1a1a1a"];
        canvas.style.backgroundColor = colors[currentLevel-1];
        groundY = (currentLevel === 1) ? h * 0.75 : h * 0.82;
        playerSize = Math.min(w, h) * 0.25; itemSize = playerSize * 0.75;
        bgScale = groundY / (h * 0.65);
        player.gravity = 0.8; player.jumpPower = -18;
        if(currentLevel < 6) { player.x = w * 0.22; player.y = groundY - playerSize; }
    }

    function jump() {
        if(!gameActive || transitioning) return;
        if(!player.isJumping) {
            player.velocityY = player.jumpPower; player.isJumping = true; 
            playSound(sounds.fart[Math.floor(Math.random()*3)]);
        } else if(currentLevel === 6) {
            playerRotation += 360; trickTextTimer = 60; playSound(sounds.jump);
            if(hasPaperAmmo > 0) {
                hasPaperAmmo--;
                projectile = { x: player.x, y: player.y, vx: 20, vy: -5 };
            }
        }
    }

    window.addEventListener("mousedown", jump);
    window.addEventListener("touchstart", (e) => { if(gameActive) { e.preventDefault(); jump(); } }, {passive: false});

    function startGame() {
        resize(); gameActive = true; transitioning = false;
        startMenu.style.display = "none"; levelMenu.style.display = "none";
        
        // Fixa musiken vid start
        if(!gameMusic.src || gameMusic.src.includes('undefined')) gameMusic.src = currentMusicFile;
        gameMusic.volume = volumeSlider.value;
        gameMusic.play().catch(e => console.log("Musik start-blockad"));
        
        playSound(sounds.wow);
    }
    document.getElementById("start-btn-menu").onclick = startGame;
    document.getElementById("go-btn").onclick = () => { currentLevel++; itemsCollected = 0; startGame(); };

    let collectables = [], spawnTimer = 0, particles = [];

    function gameLoop() {
        ctx.clearRect(0, 0, w, h);
        let bg = assets['bg'+currentLevel];
        
        if (currentLevel === 6) {
            // --- BOSS LEVEL ---
            pipeTimer += 0.025;
            player.x = (w / 2 - playerSize / 2) + Math.sin(pipeTimer) * (w * 0.38);
            let distCenter = (player.x - (w/2-playerSize/2)) / (w*0.38);
            let curve = Math.pow(distCenter, 2) * 160;
            let curGround = groundY - curve;
            player.velocityY += player.gravity; player.y += player.velocityY;
            if(player.y > curGround - playerSize) { player.y = curGround - playerSize; player.velocityY = 0; player.isJumping = false; }
            if(bg.complete) ctx.drawImage(bg, 0, 0, w, h);
            let bossX = w * 0.75, bossY = h * 0.2 + Math.sin(Date.now()*0.003)*40;
            if(assets.boss.complete) ctx.drawImage(assets.boss, bossX, bossY, playerSize*1.8, playerSize*1.8);
            if(projectile) {
                projectile.x += projectile.vx; projectile.y += projectile.vy;
                if(assets.paper.complete) ctx.drawImage(assets.paper, projectile.x, projectile.y, 60, 60);
                if(projectile.x > bossX && projectile.x < bossX + playerSize*1.8 && projectile.y > bossY && projectile.y < bossY + playerSize*1.8) {
                    bossHealth -= 15; playSound(sounds.hit); projectile = null;
                } else if(projectile.x > w) projectile = null;
            }
            if(bossHealth <= 0) { gameActive = false; winScreen.style.display="flex"; playSound(sounds.win); }
            spawnTimer++; if(spawnTimer > 80) { collectables.push({x: bossX, y: bossY+100, sW: 60, sH: 60, isPaper: true, vx: -10, vy: 2}); spawnTimer = 0; }
        } else {
            // --- LEVEL 1-5 ---
            let speed = boostTimer > 0 ? bgSpeed * 2 : bgSpeed;
            if(boostTimer > 0) boostTimer--;
            if(bg.complete) {
                bgScroll -= speed * 0.5; if(bgScroll <= -w * bgScale) bgScroll = 0;
                ctx.drawImage(bg, bgScroll, -h*0.1, w * bgScale, h * bgScale);
                ctx.drawImage(bg, bgScroll + w * bgScale, -h*0.1, w * bgScale, h * bgScale);
            }
            player.velocityY += player.gravity; player.y += player.velocityY;
            if(player.y > groundY - playerSize) { player.y = groundY - playerSize; player.velocityY = 0; player.isJumping = false; }
            
            spawnTimer++;
            if(spawnTimer > 50) {
                let imgSet = items['lvl'+currentLevel];
                let isGold = Math.random() < 0.05;
                if(imgSet) {
                    let idx = Math.floor(Math.random()*imgSet.length);
                    let targetImg = isGold ? assets.gold : imgSet[idx];
                    let ratio = targetImg.naturalHeight / targetImg.naturalWidth || 1;
                    collectables.push({ x: w, y: groundY - (itemSize * ratio) - Math.random()*(h*0.4), sW: isGold?itemSize*1.5:itemSize, sH: (isGold?itemSize*1.5:itemSize) * ratio, typeIdx: idx, isGold: isGold });
                }
                spawnTimer = 0;
            }
        }

        for(let i = collectables.length-1; i>=0; i--) {
            let c = collectables[i];
            if(currentLevel === 6) { c.x += c.vx; c.y += c.vy; } else { c.x -= (boostTimer > 0 ? bgSpeed * 2 : bgSpeed); }
            if(player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                if(c.isPaper) { hasPaperAmmo++; playSound(sounds.jump); }
                else if(c.isGold) { playSound(sounds.yeah); }
                else {
                    itemsCollected++;
                    if(currentLevel === 5 && c.typeIdx === 0) playSound(sounds.mjau);
                    if((currentLevel === 3 && c.typeIdx === 2) || (currentLevel === 4 && c.typeIdx === 1) || (currentLevel === 5 && (c.typeIdx === 0 || c.typeIdx === 2))) boostTimer = 120;
                    if(itemsCollected % 25 === 0) {
                        playSound(sounds.mega);
                        for(let j=0; j<50; j++) particles.push({x: player.x, y: player.y, vx: Math.random()*20-10, vy: Math.random()*-20, s: 8, c: '#8B4513', l: 1.5});
                    }
                    let goals = [30, 60, 90, 130, 180];
                    if(itemsCollected >= goals[currentLevel-1]) { gameActive = false; transitioning = true; playSound(sounds.next); setTimeout(() => { levelMenu.style.display="flex"; }, 1000); }
                }
                collectables.splice(i,1);
            }
            if(c.x < -200 || c.x > w + 200) collectables.splice(i,1);
        }

        collectables.forEach(c => {
            let img = c.isPaper ? assets.paper : (c.isGold ? assets.gold : items['lvl'+currentLevel][c.typeIdx]);
            if(img && img.complete) ctx.drawImage(img, c.x, c.y, c.sW, c.sH);
        });

        ctx.save();
        ctx.translate(player.x + playerSize/2, player.y + playerSize/2);
        ctx.rotate(playerRotation * Math.PI / 180);
        if(boostTimer > 0 && assets.fire.complete) ctx.drawImage(assets.fire, -playerSize, -playerSize/4, playerSize, playerSize/2);
        ctx.drawImage(assets.player, -playerSize/2, -playerSize/2, playerSize, playerSize);
        ctx.restore();

        if(trickTextTimer > 0) { ctx.fillStyle = "yellow"; ctx.font = "bold 40px Courier"; ctx.fillText("KICKFLIP!", player.x, player.y - 20); trickTextTimer--; }
        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.l -= 0.02; ctx.globalAlpha = Math.max(0, p.l); ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill(); if(p.l<=0) particles.splice(i,1); });
        ctx.globalAlpha = 1;

        if (gameActive) {
            ctx.fillStyle = "white"; ctx.font = "bold 20px Courier";
            if(currentLevel === 6) ctx.fillText(`🧻 AMMO: ${hasPaperAmmo} | HP: ${bossHealth}%`, 20, 40);
            else ctx.fillText(`✨ ${itemsCollected}`, 20, 40);
        }
        requestAnimationFrame(gameLoop);
    }
    window.onresize = resize; resize(); gameLoop();
</script>
</body>
</html>
