<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skate-bajsen: THE KEYBOARD FIX</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; transition: background-color 1s; touch-action: none; outline: none; }
        #start-menu, #level-menu, #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .game-btn-large { padding: 25px 50px; font-size: 32px; background-color: #f1c40f; border: 6px solid #000; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 20px; pointer-events: auto; }
        .level-selector { display: flex; gap: 10px; margin: 15px 0; }
        .lvl-btn { width: 45px; height: 45px; background: #333; border: 3px solid #f1c40f; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .lvl-btn.active { background: #f1c40f; color: black; box-shadow: 0 0 15px #f1c40f; }
        #ui-layer { position: absolute; bottom: 30px; right: 30px; z-index: 150; }
        @keyframes wowPop { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
        .wow-text { position: absolute; color: #f1c40f; font-size: 80px; font-weight: bold; z-index: 200; pointer-events: none; animation: wowPop 1s ease-out forwards; text-shadow: 4px 4px 0px #d35400; }
    </style>
</head>
<body onclick="canvas.focus()">

<div id="game-wrapper">
    <canvas id="gameCanvas" tabindex="0"></canvas>
    <div id="wow-container"></div>
    
    <div id="start-menu">
        <img src="bajskorv_sprite.png" style="height: 30vh; margin-bottom: 15px;">
        <h1>SKATE-BAJSEN</h1>
        <div class="level-selector">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>
        <button class="game-btn-large" onclick="startGame()">LETS GO!</button>
    </div>

    <div id="level-menu" style="display:none;">
        <h1>KLAR!</h1>
        <button class="game-btn-large" onclick="nextLevelBtn()">NÄSTA NIVÅ</button>
    </div>

    <div id="win-screen" style="display:none;">
        <h1 style="color:#f1c40f;">GRATTIS!!!</h1>
        <button class="game-btn-large" onclick="location.reload()">SPELA IGEN</button>
    </div>

    <div id="ui-layer">
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.1">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const volumeSlider = document.getElementById("volume-slider");
    
    let gameActive = false, transitioning = false, itemsCollected = 0, currentLevel = 1, bgScroll = 0;
    let w, h, groundY, playerSize, itemSize, bgSpeed = 7, boostTimer = 0;
    let bossHealth = 100, hasPaperAmmo = 0, pipeTimer = 0, projectile = null, playerRotation = 0;

    let player = { x: 0, y: 0, velocityY: 0, gravity: 0.8, jumpPower: -18, isJumping: false };

    const assets = {
        bg: [], player: new Image(), fire: new Image(), boss: new Image(), paper: new Image(), gold: new Image(),
        items: { lvl1: [], lvl2: [], lvl3: [], lvl4: [], lvl5: [] }
    };
    assets.player.src = 'bajskorv_sprite.png';
    assets.fire.src = 'fire_sprite.png'; assets.boss.src = 'boss_sprite.png'; assets.paper.src = 'paper_sprite.png'; assets.gold.src = 'gold_poop.png';
    for(let i=1; i<=6; i++) {
        let img = new Image(); img.src = i === 1 ? 'pixel_background.png' : `pixel_background${i}.png`;
        assets.bg.push(img);
    }
    
    function loadLvl(lvl, img1, img2, img3) {
        assets.items['lvl'+lvl] = [new Image(), new Image(), new Image()];
        assets.items['lvl'+lvl][0].src = img1; assets.items['lvl'+lvl][1].src = img2; assets.items['lvl'+lvl][2].src = img3;
    }
    loadLvl(1, 'unicorn_sprite.png', 'star_sprite.png', 'heart_sprite.png');
    loadLvl(2, 'candy1.png', 'candy2.png', 'candy3.png');
    loadLvl(3, 'zebra_sprite.png', 'giraffe_sprite.png', 'monkey_sprite.png');
    loadLvl(4, 'planet_sprite.png', 'alien_sprite.png', 'unicorn_sprite.png');
    loadLvl(5, 'kitten_sprite.png', 'yarnball_sprite.png', 'kitten_sprite2.png');

    const sounds = {
        fart: [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')],
        wow: new Audio('wow.m4a'), mjau: new Audio('mjau.m4a'), button: new Audio('button.mp3'),
        hit: new Audio('hit.mp3'), win: new Audio('win.mp3'), jump: new Audio('superprutt.m4a'),
        yeah: new Audio('yeah.m4a'), mega: new Audio('baaaajs.m4a'), next: new Audio('nextlevel.mp3'),
        braJobbat: new Audio('brajobbat.m4a')
    };

    let gameMusic = new Audio(); gameMusic.loop = true;
    let currentMusicFile = 'music.mp3';

    function playSound(s, isMusic = false) { 
        s.currentTime = 0; 
        s.volume = isMusic ? parseFloat(volumeSlider.value) : 1.0; 
        s.play().catch(()=>{}); 
    }

    volumeSlider.addEventListener('input', () => {
        if(gameActive && gameMusic) gameMusic.volume = parseFloat(volumeSlider.value);
    });

    function triggerWow(x, y, playAudio = true) {
        const wow = document.createElement('div');
        wow.className = 'wow-text'; wow.innerText = 'WOW!';
        wow.style.left = (x || w/2 - 100) + 'px'; wow.style.top = (y || h/2 - 50) + 'px';
        document.getElementById('wow-container').appendChild(wow);
        if(playAudio) playSound(sounds.wow);
        setTimeout(() => wow.remove(), 1000);
    }

    window.selectLevel = function(num) {
        currentLevel = num;
        document.querySelectorAll('.lvl-btn').forEach((btn, i) => btn.classList.toggle('active', i === num-1));
        currentMusicFile = (num === 5) ? 'music.mp3' : ['music.mp3', 'music2.mp3', 'music3.mp3', 'music4.mp3', 'music5.mp3', 'music6.mp3'][num-1];
        playSound(sounds.button);
    };

    function resize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        const skyColors = ["#87CEEB", "#ffb6c1", "#90ee90", "#0b0b16", "#ffe0f0", "#1a1a1a"];
        canvas.style.backgroundColor = skyColors[currentLevel-1];
        groundY = (currentLevel === 1) ? h * 0.75 : h * 0.82;
        playerSize = Math.min(w, h) * 0.25; itemSize = playerSize * 0.75;
        if(!transitioning) { player.x = w * 0.22; player.y = groundY - playerSize; }
    }

    function jumpAction() {
        if(!gameActive || transitioning) return;
        if(!player.isJumping) {
            player.velocityY = player.jumpPower; player.isJumping = true; 
            playSound(sounds.fart[Math.floor(Math.random()*3)]);
        } else if(currentLevel === 6) {
            playerRotation += 360; playSound(sounds.jump);
            if(hasPaperAmmo > 0) { hasPaperAmmo--; projectile = { x: player.x, y: player.y, vx: 20 }; }
        }
    }

    // --- FIX FÖR MELLANSLAG OCH INPUT ---
    window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
            if (gameActive) {
                e.preventDefault(); // Stoppa sidan från att scrolla
                jumpAction();
            }
        }
    });

    window.addEventListener("mousedown", (e) => { 
        if(gameActive && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
            canvas.focus();
            jumpAction();
        }
    });

    window.addEventListener("touchstart", (e) => { 
        if(gameActive && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') { 
            e.preventDefault(); 
            canvas.focus();
            jumpAction(); 
        } 
    }, {passive: false});

    window.startGame = function() {
        resize(); gameActive = true; transitioning = false;
        document.getElementById("start-menu").style.display = "none";
        document.getElementById("level-menu").style.display = "none";
        canvas.focus(); // Tvinga fokus för att Space ska fungera
        triggerWow();
        gameMusic.src = currentMusicFile; 
        gameMusic.volume = parseFloat(volumeSlider.value);
        gameMusic.play(); 
    }

    window.nextLevelBtn = function() { currentLevel++; itemsCollected = 0; startGame(); };

    let collectables = [], spawnTimer = 0, particles = [];

    function gameLoop() {
        ctx.clearRect(0, 0, w, h);
        let bg = assets.bg[currentLevel-1];
        
        if (currentLevel === 6) {
            pipeTimer += 0.025;
            player.x = (w/2 - playerSize/2) + Math.sin(pipeTimer) * (w*0.38);
            let curve = Math.pow((player.x - (w/2-playerSize/2))/(w*0.38), 2) * 160;
            let curGround = groundY - curve;
            player.velocityY += player.gravity; player.y += player.velocityY;
            if(player.y > curGround - playerSize) { player.y = curGround - playerSize; player.velocityY = 0; player.isJumping = false; }
            if(bg && bg.complete) ctx.drawImage(bg, 0, 0, w, h);
            let bossX = w * 0.75, bossY = h * 0.2 + Math.sin(Date.now()*0.003)*40;
            if(assets.boss.complete) ctx.drawImage(assets.boss, bossX, bossY, playerSize*1.8, playerSize*1.8);
            if(projectile) {
                projectile.x += projectile.vx;
                ctx.drawImage(assets.paper, projectile.x, projectile.y, 60, 60);
                if(projectile.x > bossX) { bossHealth -= 15; playSound(sounds.hit); projectile = null; }
            }
            if(bossHealth <= 0) { gameActive = false; document.getElementById("win-screen").style.display="flex"; playSound(sounds.win); }
            spawnTimer++; if(spawnTimer > 80) { collectables.push({x: bossX, y: bossY+100, isPaper: true, vx: -10, sW: 60, sH: 60}); spawnTimer = 0; }
        } else {
            let speed = boostTimer > 0 ? bgSpeed * 2 : bgSpeed;
            if(boostTimer > 0) boostTimer--;
            if(bg && bg.complete) {
                bgScroll -= speed * 0.5; if(bgScroll <= -w) bgScroll = 0;
                ctx.drawImage(bg, bgScroll, 0, w, h); ctx.drawImage(bg, bgScroll + w, 0, w, h);
            }
            if(transitioning) {
                player.x += 15; player.velocityY = 0;
            } else {
                player.velocityY += player.gravity; player.y += player.velocityY;
                if(player.y > groundY - playerSize) { player.y = groundY - playerSize; player.velocityY = 0; player.isJumping = false; }
                spawnTimer++;
                if(spawnTimer > 50) {
                    let imgSet = assets.items['lvl'+currentLevel];
                    if(imgSet) {
                        let isGold = Math.random() < 0.05;
                        let isRandomBig = Math.random() < 0.10;
                        let typeIdx = Math.floor(Math.random()*3);
                        let targetImg = isGold ? assets.gold : imgSet[typeIdx];
                        let sW = (isGold || isRandomBig) ? itemSize * 2 : itemSize;
                        let ratio = targetImg.naturalHeight / targetImg.naturalWidth || 1;
                        collectables.push({ x: w, y: groundY - (sW*ratio) - Math.random()*200, sW: sW, sH: sW*ratio, img: targetImg, isGold: isGold, isPaper: false, typeIdx: typeIdx, isBig: isRandomBig });
                    }
                    spawnTimer = 0;
                }
            }
        }

        for(let i = collectables.length - 1; i >= 0; i--) {
            let c = collectables[i];
            if(currentLevel === 6) c.x += c.vx; else c.x -= (boostTimer > 0 ? bgSpeed * 2 : bgSpeed);
            if(!transitioning && player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                if(c.isGold) { 
                    playSound(sounds.yeah);
                    for(let g=0; g<40; g++) particles.push({x: c.x + c.sW/2, y: c.y + c.sH/2, vx: Math.random()*20-10, vy: Math.random()*20-10, s: Math.random()*8+2, c: '#f1c40f', l: 1.5, isGlitter: true });
                } else if(c.isPaper) { 
                    hasPaperAmmo++; playSound(sounds.jump); 
                } else {
                    if(c.isBig) triggerWow(player.x, player.y - 100);
                    itemsCollected++;
                    if(itemsCollected % 12 === 0) playSound(sounds.braJobbat);
                    if(currentLevel === 5 && c.typeIdx === 0) playSound(sounds.mjau);
                    if((currentLevel === 3 && c.typeIdx === 2) || (currentLevel === 4 && c.typeIdx === 1) || (currentLevel === 5 && (c.typeIdx === 0 || c.typeIdx === 2))) boostTimer = 120;
                    if(itemsCollected % 25 === 0) {
                        playSound(sounds.mega);
                        setTimeout(() => {
                            if(gameActive) {
                                for(let j=0; j<80; j++) particles.push({x: player.x, y: player.y, vx: Math.random()*30-15, vy: Math.random()*-25, s: Math.random()*15+5, c: '#8B4513', l: 2.5});
                            }
                        }, 3500);
                    }
                    let goals = [30, 60, 90, 130, 180];
                    if(itemsCollected >= goals[currentLevel-1]) { 
                        transitioning = true; playSound(sounds.next); 
                        setTimeout(() => { gameActive = false; document.getElementById("level-menu").style.display="flex"; }, 1500); 
                    }
                }
                collectables.splice(i, 1);
            }
            if(c.x < -200 || c.x > w + 200) collectables.splice(i, 1);
            if(c.img && c.img.complete) ctx.drawImage(c.img, c.x, c.y, c.sW, c.sH);
            else if(c.isPaper && assets.paper.complete) ctx.drawImage(assets.paper, c.x, c.y, 60, 60);
        }

        ctx.save(); ctx.translate(player.x + playerSize/2, player.y + playerSize/2);
        ctx.rotate(playerRotation * Math.PI / 180);
        if(boostTimer > 0 && assets.fire.complete) ctx.drawImage(assets.fire, -playerSize, -playerSize/4, playerSize, playerSize/2);
        ctx.drawImage(assets.player, -playerSize/2, -playerSize/2, playerSize, playerSize); ctx.restore();

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; 
            if(p.isGlitter) { p.vy += 0.2; p.vx *= 0.98; } else { p.vy += 0.4; }
            p.l -= 0.02; ctx.globalAlpha = Math.max(0, p.l); ctx.fillStyle = p.c; 
            if(p.isGlitter && Math.random() > 0.5) ctx.fillStyle = "white"; 
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill(); 
            if(p.l<=0) particles.splice(i,1); 
        });
        ctx.globalAlpha = 1;

        if (gameActive) {
            ctx.fillStyle = "white"; ctx.font = "bold 20px Courier";
            if(currentLevel === 6) ctx.fillText(`🧻 AMMO: ${hasPaperAmmo} | HP: ${bossHealth}%`, 20, 40);
            else ctx.fillText(`✨ ${itemsCollected}`, 20, 40);
        }
        requestAnimationFrame(gameLoop);
    }
    resize(); gameLoop(); window.addEventListener("resize", resize);
</script>
</body>
</html>
