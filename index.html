<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skate-bajsen: NEXT LEVEL EDITION</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }
        #game-ui { position: absolute; top: 20px; left: 20px; color: #f1c40f; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 90; pointer-events: none; }
        #progress-bar-bg { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #f1c40f; margin-top: 5px; }
        #progress-bar-fill { width: 0%; height: 100%; background: #f1c40f; transition: width 0.2s; }
        #orientation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #f1c40f; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        #start-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        @keyframes menuFloat { 0% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-20px) rotate(2deg); } 100% { transform: translateY(0) rotate(-2deg); } }
        .menu-sprite { height: 25vh; margin-bottom: 10px; animation: menuFloat 3s infinite ease-in-out; }
        .lvl-btn { width: 45px; height: 45px; background: #333; border: 3px solid #f1c40f; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; }
        .lvl-btn.active { background: #f1c40f; color: black; box-shadow: 0 0 15px #f1c40f; }
        .game-btn-large { padding: 15px 40px; font-size: 24px; background-color: #f1c40f; border: 4px solid #000; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 500; text-align: center; animation: discoBg 0.4s infinite; }
        @keyframes discoBg { 0% { background-color: rgba(255,0,0,0.4); } 33% { background-color: rgba(0,255,0,0.4); } 66% { background-color: rgba(0,0,255,0.4); } }
        #ui-layer { position: absolute; bottom: 20px; right: 20px; z-index: 150; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; border: 1px solid #f1c40f; }
        #level-intro { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: none; justify-content: center; align-items: center; font-size: 60px; z-index: 300; font-weight: bold; }
    </style>
</head>
<body>

<div id="orientation-overlay"><h1>VÄND PÅ MOBILEN</h1><p>SKATEA I LANDSCAPE MODE! 💩🛹</p></div>

<div id="game-wrapper">
    <div id="game-ui" style="display: none;">
        <div id="score-text">POÄNG: 0 / 30</div>
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>
    <div id="level-intro">LEVEL 1</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-menu">
        <img src="bajskorv_sprite.png" class="menu-sprite">
        <div id="menu-lvl-text" style="color:#f1c40f; font-weight:bold; margin-bottom:10px;">LEVEL 1</div>
        <h1 style="font-size: 36px; margin: 5px 0;">SKATE-BAJSEN</h1>
        <div style="display:flex; gap:8px; margin-bottom:20px;">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>
        <button class="game-btn-large" onclick="startGame()">STARTA SPELET</button>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 40px; color: #f1c40f;">BOSSEN ÄR MOS!</h1>
        <img src="bajskorv_sprite.png" style="width:180px; animation: menuFloat 0.5s infinite;">
        <h1 style="font-size: 60px;">PARTY-TID!</h1>
        <button class="game-btn-large" onclick="location.reload()">SPELA IGEN</button>
    </div>

    <div id="ui-layer">
        <span style="color:#f1c40f; font-size: 10px; display: block;">MUSIKVOLYM</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.2">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const volumeSlider = document.getElementById("volume-slider");
    const gameUI = document.getElementById("game-ui"), scoreText = document.getElementById("score-text"), progressFill = document.getElementById("progress-bar-fill"), introDiv = document.getElementById("level-intro");

    let w, h, groundY, playerSize, itemSizeBase;
    let gameActive = false, currentLevel = 1, itemsCollected = 0, bgScroll = 0, screenShake = 0;
    let pipeTimer = 0, projectile = null, bossHealth = 200, hasPaperAmmo = 0, winPlayed = false, spawnTimer = 0, boostTimer = 0;
    let isEndingLevel = false; // För ut-ur-bild animationen
    
    const levelGoals = [30, 35, 40, 40, 50];
    const sounds = {
        button: new Audio('button.mp3'), lvlBtn: new Audio('levelbutton.mp3'),
        wow: new Audio('wow.m4a'), choklad: new Audio('choklad.m4a'),
        win: new Audio('win.mp3'), jump: new Audio('superprutt.m4a'),
        ouch: [new Audio('ouch.m4a'), new Audio('Aj.m4a'), new Audio('dinlilla.m4a')],
        fart: [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')],
        mjau: new Audio('mjau.m4a'), 
        nextLevel: new Audio('nextlevel.mp3') // TILLAGD: Ljud vid banbyte
    };
    let gameMusic = new Audio(); gameMusic.loop = true;

    function updateMusicVolume() { gameMusic.volume = parseFloat(volumeSlider.value); }
    volumeSlider.addEventListener('input', updateMusicVolume);

    const assets = { player: new Image(), boss: new Image(), paper: new Image(), fire: new Image(), bg: [], items: {} };
    assets.player.src = 'bajskorv_sprite.png'; assets.boss.src = 'boss_sprite.png'; assets.paper.src = 'paper_sprite.png'; assets.fire.src = 'fire_sprite.png';
    for(let i=1; i<=6; i++) { let img = new Image(); img.src = `pixel_background${i}.png`; assets.bg.push(img); }

    function loadLvl(l, i1, i2, i3) {
        assets.items['lvl'+l] = [new Image(), new Image(), new Image()];
        assets.items['lvl'+l][0].src = i1; assets.items['lvl'+l][1].src = i2; assets.items['lvl'+l][2].src = i3;
    }
    loadLvl(1, 'unicorn_sprite.png', 'star_sprite.png', 'heart_sprite.png');
    loadLvl(2, 'candy1.png', 'candy2.png', 'candy3.png');
    loadLvl(3, 'zebra_sprite.png', 'giraffe_sprite.png', 'monkey_sprite.png');
    loadLvl(4, 'planet_sprite.png', 'alien_sprite.png', 'unicorn_sprite.png');
    loadLvl(5, 'kitten_sprite.png', 'yarnball_sprite.png', 'kitten_sprite2.png');

    let player = { x: 0, y: 0, vY: 0, grav: 0.8, jump: -18, isJumping: false, rot: 0 };
    let collectables = [], particles = [];

    function handleAction() {
        if(!gameActive || isEndingLevel) return;
        if(!player.isJumping) { player.vY = player.jump; player.isJumping = true; sounds.fart[Math.floor(Math.random()*3)].play(); }
        else if(currentLevel === 6 && hasPaperAmmo > 0) { hasPaperAmmo--; projectile = {x: player.x, y: player.y}; player.rot += 360; }
    }

    function selectLevel(n) { 
        currentLevel = n; sounds.lvlBtn.currentTime = 0; sounds.lvlBtn.play(); 
        document.getElementById("menu-lvl-text").innerText = n === 6 ? "BOSS FIGHT" : "LEVEL " + n; 
        document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active', i===n-1)); 
    }

    function startGame() {
        resize(); updateMusicVolume(); sounds.button.play();
        document.getElementById("start-menu").style.display = "none";
        loadLevelSequence();
    }

    function loadLevelSequence() {
        gameActive = false; isEndingLevel = false;
        introDiv.style.display = "flex";
        introDiv.innerText = currentLevel === 6 ? "BOSS FIGHT!" : "LEVEL " + currentLevel;
        collectables = []; itemsCollected = 0; boostTimer = 0;
        player.x = w * 0.2; // Återställ position
        
        setTimeout(() => {
            introDiv.style.display = "none";
            gameActive = true;
            if(currentLevel < 6) { gameUI.style.display = "block"; updateUI(); } 
            else { gameUI.style.display = "none"; bossHealth = 200; }
            gameMusic.src = `music${currentLevel === 1 ? '' : currentLevel}.mp3`;
            gameMusic.play();
        }, 1200);
    }

    function updateUI() {
        if(currentLevel < 6) {
            const goal = levelGoals[currentLevel-1];
            scoreText.innerText = `POÄNG: ${itemsCollected} / ${goal}`;
            progressFill.style.width = (itemsCollected / goal * 100) + "%";
        }
    }

    function gameLoop() {
        requestAnimationFrame(gameLoop);
        if(!gameActive && !isEndingLevel) return;
        ctx.save();
        if(screenShake > 0) { ctx.translate(Math.random()*screenShake-screenShake/2, Math.random()*screenShake-screenShake/2); screenShake *= 0.9; }
        ctx.clearRect(0,0,w,h);
        
        let bg = assets.bg[currentLevel-1];

        // RITA BAKGRUND
        if(currentLevel < 6) {
            let speed = boostTimer > 0 ? 15 : 4;
            bgScroll -= speed; if(bgScroll <= -w) bgScroll = 0;
            if(bg.complete) { ctx.drawImage(bg, bgScroll, 0, w, h); ctx.drawImage(bg, bgScroll+w, 0, w, h); }
            
            if(!isEndingLevel) {
                player.vY += player.grav; player.y += player.vY;
                if(player.y > groundY - playerSize) { player.y = groundY - playerSize; player.vY = 0; player.isJumping = false; }
                
                spawnTimer++;
                if(spawnTimer > 50) {
                    let set = assets.items['lvl'+currentLevel];
                    let img = set[Math.floor(Math.random()*3)];
                    if(img.complete) {
                        let ratio = img.naturalWidth / img.naturalHeight;
                        collectables.push({ x: w, y: groundY - itemSizeBase - Math.random()*250, sW: itemSizeBase*ratio, sH: itemSizeBase, img: img, typeIdx: 0, done: false });
                    }
                    spawnTimer = 0;
                }
            } else {
                // ANIMATION: ÅK UT UR BILD
                player.x += 25; 
                if(player.x > w + playerSize) {
                    currentLevel++;
                    loadLevelSequence();
                }
            }
        } else {
            // BOSS LOGIK
            pipeTimer += 0.025; player.x = (w/2-playerSize/2) + Math.sin(pipeTimer)*(w*0.38);
            let curG = groundY - Math.pow((player.x - (w/2-playerSize/2))/(w*0.38), 2)*160;
            player.vY += player.grav; player.y += player.vY;
            if(player.y > curG - playerSize) { player.y = curG - playerSize; player.vY = 0; player.isJumping = false; }
            if(bg.complete) ctx.drawImage(bg, 0, 0, w, h);
            let bX = w*0.75, bY = h*0.2 + Math.sin(Date.now()*0.003)*40;
            ctx.save(); ctx.filter = 'sepia(1) saturate(10) hue-rotate(-50deg)';
            ctx.drawImage(assets.boss, bX, bY, playerSize*1.8, playerSize*1.8); ctx.restore();
            ctx.fillStyle = "red"; ctx.fillRect(bX, bY-30, playerSize*1.8, 15);
            ctx.fillStyle = "lime"; ctx.fillRect(bX, bY-30, (bossHealth/200)*(playerSize*1.8), 15);
            if(projectile) {
                projectile.x += 15; ctx.drawImage(assets.paper, projectile.x, projectile.y, 60, 60);
                if(projectile.x > bX && projectile.x < bX+200 && projectile.y > bY && projectile.y < bY+200) {
                    bossHealth -= 20; screenShake = 25; projectile = null;
                    sounds.ouch[Math.floor(Math.random()*3)].play();
                } else if(projectile.x > w) projectile = null;
            }
            if(bossHealth <= 0 && !winPlayed) {
                winPlayed = true; gameActive = false; sounds.win.play();
                document.getElementById("win-screen").style.display = "flex";
            }
            spawnTimer++; if(spawnTimer > 60) { collectables.push({x: bX, y: bY+100, isP: true, vx: -10, sW: 60, sH: 60, done: false}); spawnTimer = 0; }
        }

        // HANTERA OBJEKT
        for(let i = collectables.length - 1; i >= 0; i--) {
            let c = collectables[i]; c.x += (c.vx || (boostTimer > 0 ? -15 : -7));
            if(!isEndingLevel && player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                if(currentLevel === 2 && c.img.src.endsWith('candy1.png') && !c.done) { c.done = true; sounds.choklad.play(); }
                if(c.isP) { hasPaperAmmo++; sounds.jump.play(); }
                else { 
                    itemsCollected++;
                    updateUI();
                    if(itemsCollected >= levelGoals[currentLevel-1]) { 
                        isEndingLevel = true; // STARTA ANIMATION
                        sounds.nextLevel.play(); // SPELA LJUD
                    } 
                }
                collectables.splice(i, 1);
            } else if(c.x < -200) collectables.splice(i, 1);
            if(c.img) ctx.drawImage(c.img, c.x, c.y, c.sW, c.sH); else if(c.isP) ctx.drawImage(assets.paper, c.x, c.y, 60, 60);
        }

        if(boostTimer > 0) boostTimer--;
        ctx.save(); ctx.translate(player.x+playerSize/2, player.y+playerSize/2); ctx.rotate(player.rot*Math.PI/180);
        if(boostTimer > 0) ctx.drawImage(assets.fire, -playerSize, -playerSize/4, playerSize, playerSize/2);
        ctx.drawImage(assets.player, -playerSize/2, -playerSize/2, playerSize, playerSize); ctx.restore();
        ctx.restore();
    }

    function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; groundY = h * 0.75; playerSize = h * 0.25; itemSizeBase = playerSize * 0.65; if(!isEndingLevel) player.x = w * 0.2; player.y = groundY - playerSize; }
    function checkOrientation() { if (window.innerHeight > window.innerWidth) document.getElementById('orientation-overlay').style.display = 'flex'; else { document.getElementById('orientation-overlay').style.display = 'none'; resize(); } }
    window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') handleAction(); });
    window.addEventListener('keydown', (e) => { if(e.code === "Space") handleAction(); });
    window.addEventListener('resize', checkOrientation); checkOrientation(); gameLoop();
</script>
</body>
</html>
