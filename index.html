<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skate-bajsen: THE REBIRTH</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; transition: background-color 1s; outline: none; }
        #orientation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #f1c40f; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        #start-menu, #level-menu, #win-screen, #level-intro { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .winner-sprite { width: 250px; margin-bottom: 30px; animation: victoryDance 0.5s infinite ease-in-out; filter: drop-shadow(0 0 20px #f1c40f); }
        @keyframes victoryDance { 0%, 100% { transform: translateY(0) rotate(0deg) scale(1.2); } 50% { transform: translateY(-40px) rotate(10deg) scale(1.3); } }
        .game-btn-large { padding: 25px 60px; font-size: 32px; background-color: #f1c40f; border: 6px solid #000; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 30px; }
        .lvl-btn { width: 50px; height: 50px; background: #333; border: 3px solid #f1c40f; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .lvl-btn.active { background: #f1c40f; color: black; box-shadow: 0 0 20px #f1c40f; }
        #ui-layer { position: absolute; bottom: 30px; right: 30px; z-index: 150; }
    </style>
</head>
<body onclick="canvas.focus()">

<div id="orientation-overlay"><h1>VÄND PÅ MOBILEN</h1><p>SKATEA I LANDSCAPE MODE! 💩🛹</p></div>

<div id="game-wrapper">
    <canvas id="gameCanvas" tabindex="0"></canvas>
    <div id="level-intro" style="display:none;"><h1 id="level-intro-text" style="font-size: 100px;">LEVEL 1</h1></div>
    <div id="start-menu">
        <img src="bajskorv_sprite.png" style="height: 35vh; margin-bottom: 20px;">
        <h1>SKATE-BAJSEN</h1>
        <div style="display: flex; gap: 15px; margin: 25px 0;">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>
        <button class="game-btn-large" onclick="startGame()">LETS GO!</button>
    </div>
    <div id="level-menu" style="display:none;"><h1>KLAR!</h1><button class="game-btn-large" onclick="nextLevelBtn()">NÄSTA NIVÅ</button></div>
    <div id="win-screen" style="display:none;">
        <img src="bajskorv_sprite.png" class="winner-sprite">
        <h1 style="font-size: 80px; color: #f1c40f;">GRATTIS!!!</h1>
        <button class="game-btn-large" onclick="location.reload()">SPELA IGEN</button>
    </div>
    <div id="ui-layer"><input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.2"></div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const volumeSlider = document.getElementById("volume-slider");
    let gameActive = false, transitioning = false, itemsCollected = 0, currentLevel = 1, bgScroll = 0;
    let w, h, groundY, playerSize, itemSize, bgSpeed = 7, boostTimer = 0;
    let bossHealth = 200, hasPaperAmmo = 0, pipeTimer = 0, projectile = null, playerRotation = 0;
    let winPlayed = false, chocoLock = false;

    const levelGoals = [30, 35, 40, 40, 50];
    let player = { x: 0, y: 0, velocityY: 0, gravity: 0.8, jumpPower: -18, isJumping: false };

    const sounds = {
        fart: [new Audio('fart1.m4a'), new Audio('fart2.m4a')],
        jump: new Audio('superprutt.m4a'),
        choklad: new Audio('choklad.m4a'),
        win: new Audio('win.mp3'),
        next: new Audio('nextlevel.mp3'),
        bossOuch: [new Audio('ouch.m4a'), new Audio('Aj.m4a'), new Audio('dinlilla.m4a')]
    };
    let gameMusic = new Audio(); gameMusic.loop = true;

    function checkOrientation() {
        if (window.innerHeight > window.innerWidth) document.getElementById('orientation-overlay').style.display = 'flex';
        else { document.getElementById('orientation-overlay').style.display = 'none'; resize(); }
    }
    window.addEventListener('resize', checkOrientation);

    function resize() {
        w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h;
        groundY = h * 0.78; playerSize = h * 0.22; itemSize = playerSize * 0.8;
        player.x = w * 0.2; player.y = groundY - playerSize;
        canvas.style.backgroundColor = ["#87CEEB", "#ffb6c1", "#90ee90", "#0b0b16", "#ffe0f0", "#1a1a1a"][currentLevel-1];
    }

    function startGame() {
        document.getElementById("start-menu").style.display = "none";
        document.getElementById("level-menu").style.display = "none";
        const intro = document.getElementById("level-intro");
        intro.style.display = "flex";
        document.getElementById("level-intro-text").innerText = currentLevel === 6 ? "BOSS FIGHT!" : "LEVEL " + currentLevel;
        
        setTimeout(() => {
            intro.style.display = "none";
            gameActive = true; transitioning = false;
            gameMusic.src = ['music.mp3', 'music2.mp3', 'music3.mp3', 'music4.mp3', 'music5.mp3', 'music6.mp3'][currentLevel-1];
            gameMusic.volume = parseFloat(volumeSlider.value);
            gameMusic.play().catch(() => {});
            resize();
        }, 1200);
    }

    window.selectLevel = (n) => { currentLevel = n; document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active', i===n-1)); };
    window.nextLevelBtn = () => { currentLevel++; itemsCollected = 0; winPlayed = false; startGame(); };

    const assets = { bg: [], player: new Image(), boss: new Image(), paper: new Image(), items: { lvl1: [], lvl2: [], lvl3: [], lvl4: [], lvl5: [] } };
    assets.player.src = 'bajskorv_sprite.png'; assets.boss.src = 'boss_sprite.png'; assets.paper.src = 'paper_sprite.png';
    for(let i=1; i<=6; i++) { let img = new Image(); img.src = i===1?'pixel_background.png':`pixel_background${i}.png`; assets.bg.push(img); }
    function loadLvl(l, i1, i2, i3) { 
        assets.items['lvl'+l] = [new Image(), new Image(), new Image()];
        assets.items['lvl'+l][0].src = i1; assets.items['lvl'+l][1].src = i2; assets.items['lvl'+l][2].src = i3;
    }
    loadLvl(1, 'unicorn_sprite.png', 'star_sprite.png', 'heart_sprite.png');
    loadLvl(2, 'candy1.png', 'candy2.png', 'candy3.png');
    loadLvl(3, 'zebra_sprite.png', 'giraffe_sprite.png', 'monkey_sprite.png');
    loadLvl(4, 'planet_sprite.png', 'alien_sprite.png', 'unicorn_sprite.png');
    loadLvl(5, 'kitten_sprite.png', 'yarnball_sprite.png', 'kitten_sprite2.png');

    let collectables = [], spawnTimer = 0;

    function gameLoop() {
        requestAnimationFrame(gameLoop);
        if (!gameActive) return;

        ctx.clearRect(0, 0, w, h);
        let bg = assets.bg[currentLevel-1];

        // Bakgrund
        if(bg.complete) {
            let speed = boostTimer > 0 ? bgSpeed*2 : bgSpeed;
            bgScroll -= speed * 0.5; if(bgScroll <= -w) bgScroll = 0;
            ctx.drawImage(bg, bgScroll, 0, w, h); ctx.drawImage(bg, bgScroll+w, 0, w, h);
        }

        // Spelare Fysik
        player.velocityY += player.gravity; player.y += player.velocityY;
        if(player.y > groundY - playerSize) { player.y = groundY - playerSize; player.velocityY = 0; player.isJumping = false; }
        
        ctx.save();
        ctx.translate(player.x + playerSize/2, player.y + playerSize/2);
        ctx.rotate(playerRotation * Math.PI / 180);
        ctx.drawImage(assets.player, -playerSize/2, -playerSize/2, playerSize, playerSize);
        ctx.restore();

        // Boss-logik
        if (currentLevel === 6) {
            let bX = w*0.75, bY = h*0.2 + Math.sin(Date.now()*0.003)*40;
            ctx.drawImage(assets.boss, bX, bY, playerSize*1.8, playerSize*1.8);
            ctx.fillStyle = "red"; ctx.fillRect(bX, bY-30, playerSize*1.8, 10);
            ctx.fillStyle = "#2ecc71"; ctx.fillRect(bX, bY-30, (playerSize*1.8)*(bossHealth/200), 10);
            
            if(projectile) {
                projectile.x += 15; ctx.drawImage(assets.paper, projectile.x, projectile.y, 60, 60);
                if(projectile.x > bX) { bossHealth -= 20; projectile = null; sounds.bossOuch[0].play(); }
            }
            if(bossHealth <= 0 && !winPlayed) { winPlayed = true; gameActive = false; gameMusic.pause(); sounds.win.play(); document.getElementById("win-screen").style.display="flex"; }
            spawnTimer++; if(spawnTimer > 60) { collectables.push({x: bX, y: bY+100, isPaper: true, sW: 60, sH: 60}); spawnTimer = 0; }
        } else {
            // Vanlig spawn
            spawnTimer++;
            if(spawnTimer > 50) {
                let set = assets.items['lvl'+currentLevel];
                if(set && set[0].complete) {
                    collectables.push({ x: w, y: groundY - 150 - Math.random()*200, sW: itemSize, sH: itemSize, img: set[Math.floor(Math.random()*3)] });
                }
                spawnTimer = 0;
            }
        }

        // Hantera objekt
        for(let i = collectables.length - 1; i >= 0; i--) {
            let c = collectables[i];
            c.x -= bgSpeed;
            if(c.img) ctx.drawImage(c.img, c.x, c.y, c.sW, c.sH);
            else ctx.drawImage(assets.paper, c.x, c.y, c.sW, c.sH);

            // Kollision
            if(player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                if(c.isPaper) { hasPaperAmmo++; sounds.jump.play(); }
                else {
                    itemsCollected++;
                    if(currentLevel === 2 && !chocoLock) { 
                        chocoLock = true; sounds.choklad.play(); 
                        setTimeout(() => chocoLock = false, 300); 
                    }
                    if(itemsCollected >= levelGoals[currentLevel-1]) { 
                        gameActive = false; transitioning = true; sounds.next.play();
                        setTimeout(() => document.getElementById("level-menu").style.display="flex", 1000);
                    }
                }
                collectables.splice(i, 1);
            }
            if(c.x < -100) collectables.splice(i, 1);
        }

        // UI
        ctx.fillStyle = "white"; ctx.font = "bold 24px Courier";
        ctx.fillText(currentLevel===6 ? "🧻 AMMO: "+hasPaperAmmo : "✨ "+itemsCollected+"/"+levelGoals[currentLevel-1], 30, 50);
    }

    window.addEventListener("keydown", (e) => { 
        if(e.code === "Space" && gameActive) {
            e.preventDefault();
            if(!player.isJumping) { player.velocityY = player.jumpPower; player.isJumping = true; sounds.fart[0].play(); }
            else if(currentLevel===6 && hasPaperAmmo > 0) { hasPaperAmmo--; projectile = {x: player.x, y: player.y}; playerRotation += 360; }
        }
    });

    checkOrientation(); gameLoop();
</script>
</body>
</html>
