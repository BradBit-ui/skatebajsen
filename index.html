<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-area=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Skate-bajsen - Level 4: Rymden</title>
    <style>
        body { margin: 0; padding: 0; background-color: #ffb6c1; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; touch-action: none; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { display: block; width: 100%; height: 100%; background-color: #87CEEB; }
        #rotate-message { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffb6c1; color: #333; z-index: 300; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .phone-icon { font-size: 80px; animation: rotateAnim 2s infinite ease-in-out; }
        @keyframes rotateAnim { 0% { transform: rotate(0deg); } 50% { transform: rotate(-90deg); } 100% { transform: rotate(0deg); } }
        #ui-layer { position: absolute; bottom: 30px; right: 30px; z-index: 50; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; display: flex; flex-direction: column; align-items: center; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .slider-label { color: white; font-size: 11px; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        #volume-slider { cursor: pointer; width: 120px; accent-color: #f1c40f; }
        #start-menu, #level-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .game-btn-large { padding: 25px 50px; font-size: 32px; background-color: #f1c40f; border: 6px solid #000; box-shadow: 10px 10px 0px #d35400; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #go-btn { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        h1 { font-size: 8vw; color: #fff; text-shadow: 6px 6px 0px #d35400; margin-bottom: 10px; }
        #level-menu { display: none; background: rgba(255, 182, 193, 0.95); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="rotate-message"><div class="phone-icon">📱🔄</div><h2>Vänd telefonen!</h2></div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-menu">
        <h1>SKATE-BAJSEN</h1>
        <button id="start-btn-menu" class="game-btn-large">STARTA!</button>
    </div>

    <div id="level-menu">
        <h1 id="level-title">LEVEL 2</h1>
        <p id="level-desc">Grymt jobbat!</p>
        <button id="go-btn" class="game-btn-large">GO!</button>
    </div>

    <div id="ui-layer">
        <div class="slider-label" id="device-info">🎵 Musik</div>
        <input type="range" id="volume-slider" min="0" max="0.5" step="0.01" value="0.1">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const startMenu = document.getElementById("start-menu"), levelMenu = document.getElementById("level-menu");
    const volumeSlider = document.getElementById("volume-slider"), rotateMessage = document.getElementById("rotate-message");

    let gameActive = false, transitioning = false, itemsCollected = 0, totalItemsSpawned = 0, currentLevel = 1, bgScroll = 0;
    let w, h, groundY, playerSize, itemSize, bgSpeed = 6, bgScale;

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const volSettings = isMobile ? { start: 0.35, game: 0.06 } : { start: 0.12, game: 0.12 };
    volumeSlider.value = volSettings.start;

    let audioCtx, gainNode, gameMusic;
    const assets = {
        bg1: new Image(), bg2: new Image(), bg3: new Image(), bg4: new Image(), player: new Image(),
        items: {
            lvl1: [new Image(), new Image(), new Image()],
            lvl2: [new Image(), new Image(), new Image()],
            lvl3: [new Image(), new Image(), new Image()],
            lvl4: [new Image(), new Image(), new Image()]
        }
    };
    assets.bg1.src = 'pixel_background.png'; assets.bg2.src = 'pixel_background2.png'; assets.bg3.src = 'pixel_background3.png'; assets.bg4.src = 'pixel_background4.png';
    assets.player.src = 'bajskorv_sprite.png';
    assets.items.lvl1[0].src = 'unicorn_sprite.png'; assets.items.lvl1[1].src = 'star_sprite.png'; assets.items.lvl1[2].src = 'heart_sprite.png';
    assets.items.lvl2[0].src = 'candy1.png'; assets.items.lvl2[1].src = 'candy2.png'; assets.items.lvl2[2].src = 'candy3.png';
    assets.items.lvl3[0].src = 'zebra_sprite.png'; assets.items.lvl3[1].src = 'giraffe_sprite.png'; assets.items.lvl3[2].src = 'monkey_sprite.png';
    
    // Level 4 objekt - Uppdaterad med enhörning
    assets.items.lvl4[0].src = 'planet_sprite.png'; assets.items.lvl4[1].src = 'alien_sprite.png'; assets.items.lvl4[2].src = 'unicorn_sprite.png'; // <- Byt ut raket mot enhörning

    const fartSounds = [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')];
    const wowSound = new Audio('wow.m4a'), braJobbatSound = new Audio('brajobbat.m4a'), megaBajsSound = new Audio('baaaajs.m4a');
    const nextLevelSound = new Audio('nextlevel.mp3'), buttonSound = new Audio('button.mp3'), chokladSound = new Audio('choklad.m4a');
    
    // NYTT LJUD FÖR GNÄGG
    const neighSound = new Audio('neigh.m4a');

    let currentMusicFile = 'music.mp3';
    let confetti = [];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.connect(audioCtx.destination);
            gameMusic = new Audio(currentMusicFile);
            gameMusic.loop = true;
            gameMusic.crossOrigin = "anonymous";
            const source = audioCtx.createMediaElementSource(gameMusic);
            source.connect(gainNode);
        }
        gainNode.gain.value = volumeSlider.value;
    }

    volumeSlider.addEventListener("input", (e) => {
        if (gainNode) gainNode.gain.setTargetAtTime(e.target.value, audioCtx.currentTime, 0.03);
    });

    function resize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w; canvas.height = h;
        rotateMessage.style.display = (isMobile && h > w) ? "flex" : "none";
        
        if (currentLevel === 1) groundY = h * 0.75;
        else if (currentLevel === 2) groundY = h * 0.85;
        else if (currentLevel === 3) groundY = h * 0.82;
        else groundY = h * 0.80; // Rymden

        playerSize = Math.min(w, h) * 0.25; itemSize = playerSize * 0.8;
        bgScale = groundY / (h * 0.65);
        if(!transitioning) player.x = w * 0.22;
        player.gravity = h * 0.0024; player.jumpPower = h * -0.044;
    }

    function playSound(s) { s.volume = 1; s.currentTime = 0; s.play().catch(()=>{}); }

    function startGame() {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        gameActive = true; transitioning = false;
        startMenu.style.display = "none";
        levelMenu.style.display = "none";
        resize(); 
        player.y = groundY - playerSize;
        player.x = w * 0.22;
        playSound(wowSound);
        gameMusic.play();
        if (isMobile) fadeVolume(volSettings.game, audioCtx.currentTime, 1.5);
    }

    function startNextLevel() {
        playSound(buttonSound);
        currentLevel++;
        setTimeout(startGame, 100);
    }

    function triggerNextLevelTransition() {
        gameActive = false;
        transitioning = true;
        gameMusic.pause();
        playSound(nextLevelSound);
        
        const exitAnim = setInterval(() => {
            player.x += 15;
            if (player.x > w + 200) {
                clearInterval(exitAnim);
                showLevelMenu();
            }
        }, 20);
    }

    function createConfetti() {
        confetti = [];
        for (let i = 0; i < 100; i++) {
            confetti.push({ x: Math.random() * w, y: -Math.random() * h, size: Math.random() * 8 + 4, color: `hsl(${Math.random() * 360}, 70%, 60%)`, velocity: Math.random() * 3 + 2, angle: Math.random() * 6.28 });
        }
    }

    function showLevelMenu() {
        levelMenu.style.display = "flex";
        let nextLvl = currentLevel + 1;
        document.getElementById("level-title").innerText = `LEVEL ${nextLvl}`;
        
        if (nextLvl === 2) {
            document.getElementById("level-desc").innerText = "Grymt jobbat! Välkommen till Godislandet!";
            currentMusicFile = 'music2.mp3';
            levelMenu.style.background = "rgba(255, 182, 193, 0.95)";
        } else if (nextLvl === 3) {
            document.getElementById("level-desc").innerText = "Snyggt! Nu drar vi till Djurparken!";
            currentMusicFile = 'music3.mp3';
            levelMenu.style.background = "rgba(100, 200, 100, 0.95)";
        } else if (nextLvl === 4) {
            document.getElementById("level-desc").innerText = "Otroligt! Redo för Rymden?";
            currentMusicFile = 'music4.mp3';
            levelMenu.style.background = "rgba(44, 62, 80, 0.95)";
        }
        
        if(gameMusic) gameMusic.src = currentMusicFile;
        createConfetti();
    }

    document.getElementById("start-btn-menu").addEventListener("click", () => {
        playSound(buttonSound);
        startGame();
    });
    document.getElementById("go-btn").addEventListener("click", startNextLevel);

    let player = { x: 50, y: 0, velocityY: 0, gravity: 0, jumpPower: 0, isJumping: false };
    let collectables = [], particles = [], spawnTimer = 0;

    function handleJump() {
        if (gameActive && !player.isJumping) {
            player.velocityY = player.jumpPower; player.isJumping = true;
            playSound(fartSounds[Math.floor(Math.random()*3)]);
        }
    }

    window.addEventListener("keydown", (e) => { if(e.code === "Space") handleJump(); });
    window.addEventListener("touchstart", (e) => { 
        if(e.target.id !== 'volume-slider' && e.target.tagName !== 'BUTTON') { 
            if (gameActive) { e.preventDefault(); handleJump(); }
        }
    }, {passive: false});

    function gameLoop() {
        ctx.clearRect(0, 0, w, h);
        let currentBG = (currentLevel === 1) ? assets.bg1 : (currentLevel === 2) ? assets.bg2 : (currentLevel === 3) ? assets.bg3 : assets.bg4;
        ctx.drawImage(currentBG, bgScroll, -h*0.1, w * bgScale, h * bgScale);
        ctx.drawImage(currentBG, bgScroll + w * bgScale, -h*0.1, w * bgScale, h * bgScale);
        
        if (gameActive) {
            bgScroll -= bgSpeed; if(bgScroll <= -w * bgScale) bgScroll = 0;
            player.velocityY += player.gravity; player.y += player.velocityY;
            if(player.y > (groundY - playerSize)) { player.y = groundY - playerSize; player.velocityY = 0; player.isJumping = false; }
            
            spawnTimer++;
            if(spawnTimer > 60) {
                totalItemsSpawned++;
                let typeIdx = Math.floor(Math.random()*3);
                let isBoss = (totalItemsSpawned % 7 === 0);
                
                let baseW = itemSize;
                let baseH = itemSize;
                let imgSet = (currentLevel === 1) ? assets.items.lvl1 : (currentLevel === 2) ? assets.items.lvl2 : (currentLevel === 3) ? assets.items.lvl3 : assets.items.lvl4;
                
                if (imgSet[typeIdx].complete && imgSet[typeIdx].naturalWidth > 0) {
                    let ratio = imgSet[typeIdx].naturalHeight / imgSet[typeIdx].naturalWidth;
                    baseH = baseW * ratio;
                }
                
                let sW = isBoss ? baseW * 1.6 : baseW;
                let sH = isBoss ? baseH * 1.6 : baseH;

                collectables.push({ x: w, y: groundY - sH - Math.random()*(h*0.35), sW: sW, sH: sH, typeIdx, isBoss });
                spawnTimer = 0;
            }
            for(let i = collectables.length-1; i>=0; i--) {
                let c = collectables[i]; c.x -= bgSpeed;
                if(c.x + c.sW < 0) { collectables.splice(i, 1); continue; }
                
                if(player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                    itemsCollected++;
                    
                    // LJUDLOGIK
                    if (currentLevel === 2 && c.typeIdx === 0) playSound(chokladSound);
                    
                    // NY LJUDLOGIK FÖR ENHÖRNING PÅ LEVEL 4
                    else if (currentLevel === 4 && c.typeIdx === 2) playSound(neighSound); // Spela gnägg för enhörningen
                    
                    else if(itemsCollected % 12 === 0) playSound(braJobbatSound);

                    if(itemsCollected % 25 === 0) {
                        playSound(megaBajsSound);
                        setTimeout(() => { 
                            if (gameActive) { 
                                playSound(fartSounds[0]); 
                                for(let b=0; b<60; b++) {
                                    particles.push({ x: player.x+playerSize/2, y: player.y+playerSize/2, vx: (Math.random()-0.3)*15, vy: (Math.random()-0.8)*20, s: Math.random()*8+4, c: '#8B4513', l: 1.5 }); 
                                } 
                            } 
                        }, 3000);
                    }
                    
                    // Övergångar
                    if(itemsCollected === 30 && currentLevel === 1) triggerNextLevelTransition();
                    else if (itemsCollected === 80 && currentLevel === 2) triggerNextLevelTransition();
                    else if (itemsCollected === 130 && currentLevel === 3) triggerNextLevelTransition();
                    else if (itemsCollected === 180 && currentLevel === 4) {
                         gameActive = false;
                         alert("UNIVERSE DOMINATED! Du är herre över rymdbajset!");
                         location.reload();
                    }

                    collectables.splice(i,1);
                }
            }
        }
        
        collectables.forEach(c => {
            let imgSet = (currentLevel === 1) ? assets.items.lvl1 : (currentLevel === 2) ? assets.items.lvl2 : (currentLevel === 3) ? assets.items.lvl3 : assets.items.lvl4;
            ctx.drawImage(imgSet[c.typeIdx], c.x, c.y, c.sW, c.sH);
        });

        ctx.drawImage(assets.player, player.x, player.y, playerSize, playerSize);
        
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.l -= 0.02;
            ctx.globalAlpha = Math.max(0, p.l); ctx.fillStyle = p.c;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill();
            if(p.l <= 0) particles.splice(i,1);
        });
        ctx.globalAlpha = 1;

        if (levelMenu.style.display === "flex") {
            confetti.forEach((p, i) => {
                p.y += p.velocity; p.x += Math.sin(p.angle) * 2; p.angle += 0.05;
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                if (p.y > h) p.y = -20;
            });
        }

        if (gameActive) {
            ctx.fillStyle = "white"; ctx.font = "bold 22px Courier";
            let goal = currentLevel === 1 ? 30 : currentLevel === 2 ? 80 : currentLevel === 3 ? 130 : 180;
            ctx.fillText("✨ " + itemsCollected + " / " + goal, 30, 50);
            ctx.fillText("LEVEL " + currentLevel, 30, 80);
        }
        requestAnimationFrame(gameLoop);
    }
    window.addEventListener('resize', resize);
    resize();
    gameLoop();
</script>
</body>
</html>
