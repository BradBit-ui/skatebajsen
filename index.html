<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Skate-bajsen: AUDIO UNLOCK EDITION</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; touch-action: none; transition: background-color 0.5s; }
        #game-wrapper { position: relative; width: 100vw; height: 100vh; touch-action: none; }
        canvas { display: block; width: 100%; height: 100%; outline: none; }
        #game-ui { position: absolute; top: 20px; left: 20px; color: #f1c40f; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 95; pointer-events: none; }
        #progress-bar-bg { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #f1c40f; margin-top: 5px; }
        #progress-bar-fill { width: 0%; height: 100%; background: #f1c40f; transition: width 0.2s; }
        #level-intro { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 300; pointer-events: none; }
        #level-intro-box { padding: 30px 60px; color: white; font-size: 40px; font-weight: bold; border: 5px solid white; text-transform: uppercase; text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        #start-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; }
        .menu-sprite { height: 25vh; margin-bottom: 10px; animation: menuFloat 3s infinite ease-in-out; }
        @keyframes menuFloat { 0% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-20px) rotate(2deg); } 100% { transform: translateY(0) rotate(-2deg); } }
        .lvl-btn { width: 50px; height: 50px; background: #333; border: 3px solid #f1c40f; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 20px; transition: transform 0.2s; }
        .lvl-btn.active { background: #f1c40f; color: black; box-shadow: 0 0 15px #f1c40f; transform: scale(1.1); }
        .game-btn-large { padding: 20px 50px; font-size: 28px; background-color: #f1c40f; border: 6px solid #000; cursor: pointer; font-weight: bold; text-transform: uppercase; box-shadow: 0 8px 0 #d35400; }
        #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 500; text-align: center; background-color: #1a1a2e; }
        #ui-layer { position: absolute; bottom: 25px; right: 25px; z-index: 400; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border: 2px solid #f1c40f; }
        #volume-slider { width: 150px; height: 30px; }
        .wow-text { position: absolute; color: #f1c40f; font-size: 80px; font-weight: bold; z-index: 200; pointer-events: none; animation: wowPop 1s ease-out forwards; text-shadow: 4px 4px 0px #d35400; }
        @keyframes wowPop { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.5); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }
        #orientation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #f1c40f; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="orientation-overlay"><h1>VÄND PÅ MOBILEN</h1><p>LANDSCAPE MODE! 💩🛹</p></div>

<div id="game-wrapper">
    <div id="game-ui" style="display: none;">
        <div id="score-text">POÄNG: 0 / 30</div>
        <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    </div>
    <div id="level-intro"><div id="level-intro-box">LEVEL 1 - CITY</div></div>
    <div id="wow-container"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="start-menu">
        <img src="bajskorv_sprite.png" class="menu-sprite">
        <div class="level-indicator" id="menu-lvl-text" style="color:#f1c40f; font-weight:bold; font-size: 28px; margin-bottom: 5px;">Level 1 - City</div>
        <h1 style="font-size: 42px; margin: 0 0 20px 0;">SKATE-BAJSEN</h1>
        <div style="display:flex; gap:10px; margin-bottom:25px;">
            <div class="lvl-btn active" onclick="selectLevel(1)">1</div>
            <div class="lvl-btn" onclick="selectLevel(2)">2</div>
            <div class="lvl-btn" onclick="selectLevel(3)">3</div>
            <div class="lvl-btn" onclick="selectLevel(4)">4</div>
            <div class="lvl-btn" onclick="selectLevel(5)">5</div>
            <div class="lvl-btn" onclick="selectLevel(6)">🔥</div>
        </div>
        <button class="game-btn-large" onclick="startGame()">LETS GO!</button>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 40px; color: #f1c40f;">Boombäjs-party!</h1>
        <p style="font-size:24px; color: white;">Hela toaletten gungar!</p>
        <button class="game-btn-large" onclick="location.reload()">SPELA IGEN</button>
    </div>

    <div id="ui-layer">
        <span style="color:#f1c40f; font-size:12px; display:block; margin-bottom:5px; font-weight:bold;">MUSIKVOLYM</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.05">
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
    const volumeSlider = document.getElementById("volume-slider"), gameUI = document.getElementById("game-ui"), progressFill = document.getElementById("progress-bar-fill"), scoreText = document.getElementById("score-text"), introDiv = document.getElementById("level-intro"), introBox = document.getElementById("level-intro-box"), startMenu = document.getElementById("start-menu");

    let w, h, groundY, playerSize, itemSizeBase, gameActive = false, currentLevel = 1, itemsCollected = 0, bgScroll = 0, screenShake = 0, spawnTimer = 0, boostTimer = 0, isEndingLevel = false, pipeTimer = 0, projectile = null, bossHealth = 200, hasPaperAmmo = 0, winPlayed = false;
    
    const levelGoals = [30, 35, 40, 40, 50];
    const levelData = [
        { name: "Level 1 - City", color: "rgba(155, 89, 182, 0.8)", bg: "#1a1a2e" },
        { name: "Level 2 - Candy", color: "rgba(231, 76, 60, 0.8)", bg: "#2e0a1a" },
        { name: "Level 3 - Zoo", color: "rgba(46, 204, 113, 0.8)", bg: "#0a1f0a" },
        { name: "Level 4 - Space", color: "rgba(52, 152, 219, 0.8)", bg: "#050a1f" },
        { name: "Level 5 - Cats & Rainbows", color: "rgba(241, 196, 15, 0.8)", bg: "#1f1f05" },
        { name: "Level 6 - BOSS FIGHTEN", color: "rgba(255, 0, 0, 0.9)", bg: "#200000" }
    ];

    const sounds = {
        button: new Audio('button.mp3'), lvlBtn: new Audio('levelbutton.mp3'), wow: new Audio('wow.m4a'), 
        choklad: new Audio('choklad.m4a'), win: new Audio('win.mp3'), next: new Audio('nextlevel.mp3'), 
        jump: new Audio('superprutt.m4a'), ouch: [new Audio('ouch.m4a'), new Audio('Aj.m4a'), new Audio('dinlilla.m4a')],
        fart: [new Audio('fart1.m4a'), new Audio('fart2.m4a'), new Audio('fart3.m4a')],
        mjau: new Audio('mjau.m4a'), yeah: new Audio('yeah.m4a'), mega: new Audio('baaaajs.m4a'), bra: new Audio('brajobbat.m4a')
    };
    let gameMusic = new Audio(); gameMusic.loop = true;

    // AUDIO UNLOCKER: Tvingar mobilen att acceptera ljud
    function unlockAudio() {
        Object.values(sounds).forEach(s => {
            if(Array.isArray(s)) { s.forEach(aud => { aud.play(); aud.pause(); aud.currentTime = 0; }); }
            else { s.play(); s.pause(); s.currentTime = 0; }
        });
        gameMusic.play(); gameMusic.pause();
    }

    function updateVol() { gameMusic.volume = parseFloat(volumeSlider.value); }
    volumeSlider.addEventListener('input', updateVol);

    const assets = { player: new Image(), boss: new Image(), paper: new Image(), fire: new Image(), gold: new Image(), bg: [], items: {} };
    assets.player.src = 'bajskorv_sprite.png'; assets.boss.src = 'boss_sprite.png'; assets.paper.src = 'paper_sprite.png'; assets.fire.src = 'fire_sprite.png'; assets.gold.src = 'gold_poop.png';
    for(let i=1; i<=6; i++) { let img = new Image(); img.src = `pixel_background${i}.png`; assets.bg.push(img); }

    function loadLvl(l, i1, i2, i3) {
        assets.items['lvl'+l] = [new Image(), new Image(), new Image()];
        assets.items['lvl'+l][0].src = i1; assets.items['lvl'+l][1].src = i2; assets.items['lvl'+l][2].src = i3;
    }
    loadLvl(1, 'unicorn_sprite.png', 'star_sprite.png', 'heart_sprite.png');
    loadLvl(2, 'candy1.png', 'candy2.png', 'candy3.png');
    loadLvl(3, 'zebra_sprite.png', 'giraffe_sprite.png', 'monkey_sprite.png');
    loadLvl(4, 'planet_sprite.png', 'alien_sprite.png', 'unicorn_sprite.png');
    loadLvl(5, 'kitten_sprite.png', 'yarnball_sprite.png', 'kitten_sprite2.png');

    let player = { x: 0, y: 0, vY: 0, grav: 0.8, jump: -18, isJumping: false, rot: 0 };
    let collectables = [], particles = [];

    function triggerWow(x, y) {
        const wow = document.createElement('div'); wow.className = 'wow-text'; wow.innerText = 'WOW!';
        wow.style.left = (x || w/2-50)+'px'; wow.style.top = (y || h/2-50)+'px';
        document.getElementById('wow-container').appendChild(wow);
        sounds.wow.currentTime = 0; sounds.wow.play(); setTimeout(() => wow.remove(), 1000);
    }

    function selectLevel(n) { 
        currentLevel = n; sounds.lvlBtn.play(); 
        document.getElementById("menu-lvl-text").innerText = levelData[n-1].name;
        document.body.style.backgroundColor = levelData[n-1].bg;
        document.querySelectorAll('.lvl-btn').forEach((b,i)=>b.classList.toggle('active', i===n-1)); 
    }

    function startGame() { 
        unlockAudio(); // LÅS UPP LJUDET VID KLICK
        resize(); updateVol(); sounds.button.play(); startMenu.style.display = "none"; loadLevelSequence(); 
    }

    function loadLevelSequence() {
        gameActive = false; isEndingLevel = false;
        introDiv.style.display = "flex";
        introBox.innerText = levelData[currentLevel-1].name;
        introBox.style.backgroundColor = levelData[currentLevel-1].color;
        collectables = []; itemsCollected = 0; boostTimer = 0; player.x = w * 0.2;
        setTimeout(() => {
            introDiv.style.display = "none"; gameActive = true;
            if(currentLevel < 6) { gameUI.style.display = "block"; updateUI(); } else { gameUI.style.display = "none"; bossHealth = 200; }
            gameMusic.src = currentLevel === 1 ? 'music.mp3' : `music${currentLevel}.mp3`; 
            gameMusic.volume = parseFloat(volumeSlider.value);
            gameMusic.play().catch(e => console.log("Ljud blockerat"));
        }, 1600);
    }

    function updateUI() { if(currentLevel < 6) { const goal = levelGoals[currentLevel-1]; scoreText.innerText = `POÄNG: ${itemsCollected} / ${goal}`; progressFill.style.width = (itemsCollected / goal * 100) + "%"; } }

    function handleJump() {
        if(!gameActive || isEndingLevel) return;
        if(!player.isJumping) { 
            player.vY = player.jump; player.isJumping = true; 
            sounds.fart[Math.floor(Math.random()*3)].play(); 
        } else if(currentLevel === 6 && hasPaperAmmo > 0) {
            hasPaperAmmo--; projectile = {x: player.x, y: player.y}; player.rot += 360;
        }
    }

    function spawnPoopFest() {
        sounds.mega.currentTime = 0; sounds.mega.play();
        setTimeout(() => {
            for(let j=0; j<120; j++) {
                particles.push({
                    x: player.x + playerSize/2, y: player.y + playerSize/2,
                    vx: Math.random()*40 - 20, vy: Math.random()*-30 - 5,
                    c: '#8B4513', l: 2.5, grav: 0.8
                });
            }
        }, 1600);
    }

    function gameLoop() {
        requestAnimationFrame(gameLoop);
        if(!gameActive && !isEndingLevel) return;
        ctx.save();
        if(screenShake > 0) { ctx.translate(Math.random()*screenShake-screenShake/2, Math.random()*screenShake-screenShake/2); screenShake *= 0.9; }
        ctx.clearRect(0,0,w,h);
        let bg = assets.bg[currentLevel-1];
        if(currentLevel < 6) {
            let speed = boostTimer > 0 ? 15 : 4;
            bgScroll -= speed; if(bgScroll <= -w) bgScroll = 0;
            if(bg.complete) { ctx.drawImage(bg, bgScroll, 0, w, h); ctx.drawImage(bg, bgScroll+w, 0, w, h); }
            if(!isEndingLevel) {
                player.vY += player.grav; player.y += player.vY;
                if(player.y > groundY - playerSize) { player.y = groundY - playerSize; player.vY = 0; player.isJumping = false; }
                spawnTimer++;
                if(spawnTimer > 50) {
                    let isG = Math.random() < 0.05, set = assets.items['lvl'+currentLevel], type = Math.floor(Math.random()*3);
                    let img = isG ? assets.gold : set[type];
                    if(img.complete) collectables.push({ x: w, y: groundY - itemSizeBase - Math.random()*250, sW: itemSizeBase*(img.width/img.height), sH: itemSizeBase, img: img, typeIdx: type, isG: isG });
                    spawnTimer = 0;
                }
            } else { player.x += 25; if(player.x > w + playerSize) { currentLevel++; loadLevelSequence(); } }
        } else {
            pipeTimer += 0.025; player.x = (w/2-playerSize/2) + Math.sin(pipeTimer)*(w*0.38);
            let curG = groundY - Math.pow((player.x - (w/2-playerSize/2))/(w*0.38), 2)*160;
            player.vY += player.grav; player.y += player.vY;
            if(player.y > curG - playerSize) { player.y = curG - playerSize; player.vY = 0; player.isJumping = false; }
            if(bg.complete) ctx.drawImage(bg, 0, 0, w, h);
            let bX = w*0.75, bY = h*0.2 + Math.sin(Date.now()*0.003)*40;
            ctx.save(); ctx.filter = 'sepia(1) saturate(10) hue-rotate(-50deg)'; ctx.drawImage(assets.boss, bX, bY, playerSize*1.8, playerSize*1.8); ctx.restore();
            ctx.fillStyle = "red"; ctx.fillRect(bX, bY-30, playerSize*1.8, 15); ctx.fillStyle = "lime"; ctx.fillRect(bX, bY-30, (bossHealth/200)*(playerSize*1.8), 15);
            if(projectile) {
                projectile.x += 15; ctx.drawImage(assets.paper, projectile.x, projectile.y, 60, 60);
                if(projectile.x > bX && projectile.x < bX+200 && projectile.y > bY && projectile.y < bY+200) { bossHealth -= 20; screenShake = 25; projectile = null; sounds.ouch[Math.floor(Math.random()*3)].play(); } else if(projectile.x > w) projectile = null;
            }
            if(bossHealth <= 0 && !winPlayed) { winPlayed = true; gameActive = false; sounds.win.play(); document.getElementById("win-screen").style.display = "flex"; }
            spawnTimer++; if(spawnTimer > 60) { collectables.push({x: bX, y: bY+100, isP: true, vx: -10, sW: 60, sH: 60}); spawnTimer = 0; }
        }
        for(let i = collectables.length - 1; i >= 0; i--) {
            let c = collectables[i]; c.x += (c.vx || (boostTimer > 0 ? -15 : -7));
            if(!isEndingLevel && player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                if(Math.random() < 0.08) { triggerWow(c.x, c.y); }
                if(c.isG) { sounds.yeah.currentTime = 0; sounds.yeah.play(); for(let g=0;g<30;g++) particles.push({x:c.x, y:c.y, vx:Math.random()*20-10, vy:Math.random()*20-10, c:'#f1c40f', l:1, grav: 0.1}); }
                else if(c.isP) { hasPaperAmmo++; sounds.jump.play(); }
                else {
                    if(currentLevel === 2 && c.img.src.includes('candy1.png')) sounds.choklad.play();
                    itemsCollected++; updateUI();
                    if(itemsCollected % 12 === 0) sounds.bra.play();
                    if(itemsCollected % 25 === 0) spawnPoopFest();
                    if((currentLevel === 3 && c.typeIdx === 1) || (currentLevel === 4 && c.typeIdx === 1) || (currentLevel === 5 && c.typeIdx === 0)) { boostTimer = 180; if(currentLevel===5 && c.typeIdx === 0) sounds.mjau.play(); }
                    if(itemsCollected >= levelGoals[currentLevel-1]) { isEndingLevel = true; sounds.next.play(); }
                }
                collectables.splice(i, 1);
            } else if(c.x < -200) collectables.splice(i, 1);
            if(c.img && c.x > -500) ctx.drawImage(c.img, c.x, c.y, c.sW, c.sH); else if(c.isP) ctx.drawImage(assets.paper, c.x, c.y, 60, 60);
        }
        if(boostTimer > 0) boostTimer--;
        ctx.save(); ctx.translate(player.x+playerSize/2, player.y+playerSize/2); ctx.rotate(player.rot*Math.PI/180);
        if(boostTimer > 0) ctx.drawImage(assets.fire, -playerSize + 5, -playerSize/4, playerSize, playerSize/2);
        ctx.drawImage(assets.player, -playerSize/2, -playerSize/2, playerSize, playerSize); ctx.restore();
        particles.forEach((p, i) => { p.x+=p.vx; p.vy += (p.grav || 0.4); p.y+=p.vy; p.l-=0.015; ctx.globalAlpha=Math.max(0, p.l); ctx.fillStyle=p.c; ctx.fillRect(p.x,p.y,12,12); if(p.l<=0) particles.splice(i,1); });
        ctx.restore();
    }

    function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; groundY = h*0.75; playerSize = h*0.25; itemSizeBase = playerSize*0.65; if(!isEndingLevel) player.x = w*0.2; player.y = groundY-playerSize; }
    function checkOrientation() { document.getElementById('orientation-overlay').style.display = (window.innerHeight > window.innerWidth) ? 'flex' : 'none'; resize(); }
    window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON') handleJump(); });
    window.addEventListener('keydown', (e) => { if(e.code === "Space") handleJump(); });
    window.addEventListener('resize', checkOrientation); checkOrientation(); gameLoop();
    setInterval(() => { if(gameActive) updateVol(); }, 1000); // KONTROLLERA VOLYM VARJE SEKUND
</script>
</body>
</html>
