<script>
    // ... (Behåll assets och ljudladdning från förra versionen) ...

    let boostTimer = 0; // För den nya roliga Speed Boosten

    function triggerNextLevelTransition() {
        gameActive = false;
        transitioning = true;
        gameMusic.pause();
        
        // Fix: Spela ljudet direkt här för att säkra att det hörs varje gång
        playSound(nextLevelSound); 
        
        const exitAnim = setInterval(() => {
            player.x += 15;
            if (player.x > w + 200) {
                clearInterval(exitAnim);
                showLevelMenu();
            }
        }, 20);
    }

    function gameLoop() {
        ctx.clearRect(0, 0, w, h);
        
        let currentBG = (currentLevel === 1) ? assets.bg1 : (currentLevel === 2) ? assets.bg2 : (currentLevel === 3) ? assets.bg3 : assets.bg4;
        
        // Speed Boost logik
        let effectiveSpeed = boostTimer > 0 ? bgSpeed * 2 : bgSpeed;
        if (boostTimer > 0) boostTimer--;

        ctx.drawImage(currentBG, bgScroll, -h*0.1, w * bgScale, h * bgScale);
        ctx.drawImage(currentBG, bgScroll + w * bgScale, -h*0.1, w * bgScale, h * bgScale);
        
        if (gameActive) {
            bgScroll -= effectiveSpeed; 
            if(bgScroll <= -w * bgScale) bgScroll = 0;
            
            player.velocityY += player.gravity; player.y += player.velocityY;
            if(player.y > (groundY - playerSize)) { player.y = groundY - playerSize; player.velocityY = 0; player.isJumping = false; }
            
            spawnTimer++;
            if(spawnTimer > 60) {
                totalItemsSpawned++;
                let typeIdx = Math.floor(Math.random()*3);
                let isBoss = (totalItemsSpawned % 7 === 0);
                
                let imgSet = (currentLevel === 1) ? assets.items.lvl1 : (currentLevel === 2) ? assets.items.lvl2 : (currentLevel === 3) ? assets.items.lvl3 : assets.items.lvl4;
                let baseW = itemSize;
                let baseH = itemSize;
                
                if (imgSet[typeIdx].complete && imgSet[typeIdx].naturalWidth > 0) {
                    baseH = baseW * (imgSet[typeIdx].naturalHeight / imgSet[typeIdx].naturalWidth);
                }
                
                collectables.push({ x: w, y: groundY - baseH - Math.random()*(h*0.35), sW: isBoss ? baseW*1.6 : baseW, sH: isBoss ? baseH*1.6 : baseH, typeIdx, isBoss });
                spawnTimer = 0;
            }

            for(let i = collectables.length-1; i>=0; i--) {
                let c = collectables[i]; c.x -= effectiveSpeed;
                if(c.x + c.sW < 0) { collectables.splice(i, 1); continue; }
                
                if(player.x < c.x + c.sW && player.x + playerSize > c.x && player.y < c.y + c.sH && player.y + playerSize > c.y) {
                    itemsCollected++;
                    
                    // FUNKTION: Speed Boost när man tar Apa (lvl3, idx 2) eller Alien (lvl4, idx 1)
                    if ((currentLevel === 3 && c.typeIdx === 2) || (currentLevel === 4 && c.typeIdx === 1)) {
                        boostTimer = 120; // 2 sekunder i 60fps
                    }

                    if (currentLevel === 2 && c.typeIdx === 0) playSound(chokladSound);
                    else if (currentLevel === 4 && c.typeIdx === 2) playSound(neighSound);
                    else if(itemsCollected % 12 === 0) playSound(braJobbatSound);

                    if(itemsCollected % 25 === 0) {
                        playSound(megaBajsSound);
                        setTimeout(() => { 
                            if (gameActive) { 
                                playSound(fartSounds[0]); 
                                for(let b=0; b<60; b++) {
                                    particles.push({ x: player.x+playerSize/2, y: player.y+playerSize/2, vx: (Math.random()-0.3)*15, vy: (Math.random()-0.8)*20, s: Math.random()*8+4, c: '#8B4513', l: 1.5 }); 
                                } 
                            } 
                        }, 3000);
                    }
                    
                    // NYA MÅL: Mycket snabbare Djurpark!
                    // Lvl 1: 30 | Lvl 2: 60 (+30) | Lvl 3: 90 (+30) | Lvl 4: 140 (+50)
                    if(itemsCollected === 30 && currentLevel === 1) triggerNextLevelTransition();
                    else if (itemsCollected === 60 && currentLevel === 2) triggerNextLevelTransition();
                    else if (itemsCollected === 90 && currentLevel === 3) triggerNextLevelTransition();
                    else if (itemsCollected === 140 && currentLevel === 4) {
                         gameActive = false;
                         alert("UNIVERSE DOMINATED!");
                         location.reload();
                    }
                    collectables.splice(i,1);
                }
            }
        }
        
        // Rita objekt med "GLOW" så de syns bättre
        collectables.forEach(c => {
            let imgSet = (currentLevel === 1) ? assets.items.lvl1 : (currentLevel === 2) ? assets.items.lvl2 : (currentLevel === 3) ? assets.items.lvl3 : assets.items.lvl4;
            
            ctx.save();
            if (currentLevel === 3) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = "white"; // Gör att djuren lyser i djurparken
            }
            ctx.drawImage(imgSet[c.typeIdx], c.x, c.y, c.sW, c.sH);
            ctx.restore();
        });

        // Rita spelare (med eld om boosten är på!)
        if (boostTimer > 0) {
            ctx.fillStyle = "orange";
            ctx.beginPath();
            ctx.arc(player.x, player.y + playerSize/2, 20 + Math.random()*10, 0, 7);
            ctx.fill();
        }
        ctx.drawImage(assets.player, player.x, player.y, playerSize, playerSize);
        
        // ... (Behåll resten av gameLoop) ...

        if (gameActive) {
            ctx.fillStyle = "white"; ctx.font = "bold 22px Courier";
            let goal = currentLevel === 1 ? 30 : currentLevel === 2 ? 60 : currentLevel === 3 ? 90 : 140;
            ctx.fillText("✨ " + itemsCollected + " / " + goal, 30, 50);
            ctx.fillText("LEVEL " + currentLevel + (boostTimer > 0 ? " BOOST!" : ""), 30, 80);
        }
        requestAnimationFrame(gameLoop);
    }
</script>
